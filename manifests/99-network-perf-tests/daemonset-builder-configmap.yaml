---
apiVersion: v1
kind: ConfigMap
metadata:
  name: daemonset-builder
  namespace: default
data:
  build-daemonset.py: |
    #!/usr/bin/env python3
    """Build DaemonSet YAML from template with RDMA resources"""
    import sys
    import subprocess
    
    # Get SR-IOV annotation and RDMA resources from args
    sriov_annotation = sys.argv[1] if len(sys.argv) > 1 else ""
    rdma_resources = sys.argv[2:] if len(sys.argv) > 2 else []
    
    # Get template
    result = subprocess.run(
        ['oc', 'get', 'configmap', 'network-perf-test-daemonset-template',
         '-o', 'jsonpath={.data.daemonset\\.yaml}'],
        stdout=subprocess.PIPE, stderr=subprocess.PIPE, universal_newlines=True
    )
    
    template = result.stdout
    
    # Replace SR-IOV placeholder
    template = template.replace('SRIOV_NETWORKS_PLACEHOLDER', sriov_annotation)
    
    # Build RDMA resource lines (12 spaces indentation to match template)
    rdma_lines = '\n'.join([f'            {res}: "1"' for res in rdma_resources])

    # Replace placeholders (match exact indentation from template)
    template = template.replace(
        '            # RDMA_RESOURCES_PLACEHOLDER will be replaced with discovered RDMA resources\n' +
        '            # Example: rdma/rdma_shared_nic4: "1"',
        rdma_lines
    )
    template = template.replace(
        '            # RDMA_RESOURCES_PLACEHOLDER will be replaced with discovered RDMA resources',
        rdma_lines
    )
    
    print(template)
