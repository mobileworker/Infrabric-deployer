---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: network-perf-test
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: network-perf-test
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "list", "create", "delete", "patch", "update"]
- apiGroups: ["sriovnetwork.openshift.io"]
  resources: ["sriovnetworks"]
  verbs: ["get", "list"]
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: network-perf-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: network-perf-test
subjects:
- kind: ServiceAccount
  name: network-perf-test
  namespace: default
---
---
# DaemonSet is created dynamically by the Job below after auto-discovering SR-IOV networks
# Template stored in daemonset-template.yaml ConfigMap
---
# Job to coordinate and run the tests
apiVersion: batch/v1
kind: Job
metadata:
  name: network-perf-test
  namespace: default
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: network-perf-test
      restartPolicy: Never
      containers:
      - name: test-coordinator
        image: registry.redhat.io/openshift4/ose-cli:latest
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: report-scripts
          mountPath: /opt/report-generator
          readOnly: true
        env:
        - name: CLEANUP_WORKERS
          value: "false"  # Set to "false" to keep worker pods running after tests
        - name: KEEP_COORDINATOR_ALIVE
          value: "true"  # Set to "true" to keep coordinator pod running (sleep infinity) for debugging
        - name: TEST_DURATION
          value: "5"  # Duration in seconds for each test (RDMA, TCP, NCCL)
        command:
        - /bin/bash
        - -c
        - |
          # Capture all output to file for report generation
          exec > >(tee /tmp/test-output.log) 2>&1

          # Suppress kubectl/oc memcache warnings (external.metrics.k8s.io/v1beta1 errors)
          export KUBECTL_HIDE_MEMCACHE_ERRORS=1

          # Redirect oc stderr to filter out memcache errors
          oc() {
            command oc "$@" 2> >(grep -v "memcache.go\|external.metrics.k8s.io" >&2)
          }

          set -e

          # Test configuration
          TEST_DURATION=${TEST_DURATION:-60}  # Default to 60 seconds if not set
          TEST_TIMEOUT=$((TEST_DURATION + 10))  # Timeout = duration + 10 seconds

          # Initialize SQLite database for test results
          echo "Initializing SQLite database..."

          # Install sqlite3 if not available
          if ! command -v sqlite3 &> /dev/null; then
            echo "Installing sqlite3..."
            microdnf install -y sqlite >/dev/null 2>&1 || yum install -y sqlite >/dev/null 2>&1 || true
            echo "✓ sqlite3 installed"
          fi

          # Database file location
          DB_FILE="/tmp/network-perf-results.db"

          # Generate unique test run ID
          TEST_RUN_ID=$(date +%s)_$$
          echo "Test Run ID: $TEST_RUN_ID"

          # Create database schema
          sqlite3 "$DB_FILE" << 'EOF_SCHEMA'
          CREATE TABLE IF NOT EXISTS test_runs (
            test_run_id TEXT PRIMARY KEY,
            start_time INTEGER,
            end_time INTEGER,
            test_duration INTEGER,
            network_type TEXT,
            pod_count INTEGER,
            test_status TEXT
          );

          CREATE TABLE IF NOT EXISTS ib_results (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            test_run_id TEXT,
            source_pod TEXT,
            target_pod TEXT,
            source_node TEXT,
            target_node TEXT,
            source_gpu TEXT,
            target_gpu TEXT,
            nic_interface TEXT,
            rdma_device_source TEXT,
            rdma_device_target TEXT,
            link_speed_gbps INTEGER,
            message_size INTEGER,
            test_mode TEXT,
            memory_type TEXT,
            bandwidth_gbps REAL,
            iterations INTEGER,
            test_status TEXT,
            timestamp INTEGER,
            FOREIGN KEY (test_run_id) REFERENCES test_runs(test_run_id)
          );

          CREATE TABLE IF NOT EXISTS roce_results (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            test_run_id TEXT,
            source_pod TEXT,
            target_pod TEXT,
            source_node TEXT,
            target_node TEXT,
            source_gpu TEXT,
            target_gpu TEXT,
            nic_interface TEXT,
            rdma_device_source TEXT,
            rdma_device_target TEXT,
            link_speed_gbps INTEGER,
            message_size INTEGER,
            test_mode TEXT,
            memory_type TEXT,
            bandwidth_gbps REAL,
            iterations INTEGER,
            test_status TEXT,
            timestamp INTEGER,
            FOREIGN KEY (test_run_id) REFERENCES test_runs(test_run_id)
          );

          CREATE TABLE IF NOT EXISTS tcp_results (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            test_run_id TEXT,
            source_pod TEXT,
            target_pod TEXT,
            source_node TEXT,
            target_node TEXT,
            nic_interface TEXT,
            link_speed_gbps INTEGER,
            test_mode TEXT,
            bandwidth_gbps REAL,
            streams INTEGER,
            test_status TEXT,
            timestamp INTEGER,
            FOREIGN KEY (test_run_id) REFERENCES test_runs(test_run_id)
          );

          CREATE TABLE IF NOT EXISTS nccl_results (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            test_run_id TEXT,
            pod_name TEXT,
            node_name TEXT,
            gpu_model TEXT,
            gpu_count INTEGER,
            test_name TEXT,
            peak_size_bytes INTEGER,
            peak_bandwidth_gbps REAL,
            test_status TEXT,
            timestamp INTEGER,
            FOREIGN KEY (test_run_id) REFERENCES test_runs(test_run_id)
          );

          CREATE TABLE IF NOT EXISTS multinode_nccl_results (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            test_run_id TEXT,
            message_size_bytes INTEGER,
            bandwidth_gbps REAL,
            node_count INTEGER,
            test_status TEXT,
            timestamp INTEGER,
            FOREIGN KEY (test_run_id) REFERENCES test_runs(test_run_id)
          );

          CREATE TABLE IF NOT EXISTS gpu_nic_topology (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            test_run_id TEXT,
            pod_name TEXT,
            node_name TEXT,
            nic_device TEXT,
            gpu_id INTEGER,
            connection_type TEXT,
            timestamp INTEGER,
            FOREIGN KEY (test_run_id) REFERENCES test_runs(test_run_id)
          );

          CREATE TABLE IF NOT EXISTS ucx_results (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            test_run_id TEXT,
            source_pod TEXT,
            target_pod TEXT,
            source_node TEXT,
            target_node TEXT,
            source_gpu TEXT,
            target_gpu TEXT,
            rdma_device_source TEXT,
            rdma_device_target TEXT,
            message_size INTEGER,
            memory_type TEXT,
            bandwidth_gbps REAL,
            bandwidth_mbps REAL,
            latency_us REAL,
            iterations INTEGER,
            test_status TEXT,
            timestamp INTEGER,
            FOREIGN KEY (test_run_id) REFERENCES test_runs(test_run_id)
          );

          CREATE TABLE IF NOT EXISTS latency_results (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            test_run_id TEXT,
            source_pod TEXT,
            target_pod TEXT,
            source_node TEXT,
            target_node TEXT,
            source_gpu TEXT,
            target_gpu TEXT,
            rdma_device_source TEXT,
            rdma_device_target TEXT,
            message_size INTEGER,
            memory_type TEXT,
            latency_median_us REAL,
            latency_average_us REAL,
            latency_99p_us REAL,
            iterations INTEGER,
            test_status TEXT,
            timestamp INTEGER,
            FOREIGN KEY (test_run_id) REFERENCES test_runs(test_run_id)
          );
          EOF_SCHEMA

          # Insert test run metadata
          sqlite3 "$DB_FILE" "INSERT INTO test_runs (test_run_id, start_time, test_duration, test_status) VALUES ('$TEST_RUN_ID', $(date +%s), $TEST_DURATION, 'running');"

          echo "✓ Database initialized: $DB_FILE"
          echo ""

          # Color definitions
          CYAN='\033[1;36m'
          GREEN='\033[1;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[1;34m'
          MAGENTA='\033[1;35m'
          RED='\033[1;31m'
          BOLD='\033[1m'
          RESET='\033[0m'

          # Ensure jq is available for NCCL JSON parsing
          if ! command -v jq &> /dev/null; then
            echo "Installing jq..."
            microdnf install -y jq >/dev/null 2>&1 || yum install -y jq >/dev/null 2>&1 || true
            echo "✓ jq installed"
          fi

          # Compact DB dump function
          dump_db() {
            echo -e "\n${CYAN}=== DB DUMP ===${RESET}"
            for t in ib_results ucx_results latency_results roce_results tcp_results nccl_results; do
              sqlite3 -header -column "$DB_FILE" "SELECT * FROM $t WHERE test_run_id='$TEST_RUN_ID';" 2>/dev/null && echo ""
            done
            echo -e "${CYAN}=== END ===${RESET}\n"
          }
          trap dump_db EXIT

          # Helper function: Calculate optimal iperf3 streams based on NIC speed
          # Formula: streams = speed_in_gbps / 8 (integer division, minimum 2)
          # Based on Intel recommendation of 6-8 streams for 100G networks
          calculate_iperf3_streams() {
            local nic_speed_gbps=$1
            local streams=$((nic_speed_gbps / 8))
            [ $streams -lt 2 ] && streams=2
            echo $streams
          }

          # Helper function: Run iperf3 client with optimized parameters
          # Usage: run_iperf3_client <pod> <target_ip> <port> <duration> <nic_speed_gbps> <output_file>
          run_iperf3_client() {
            local pod=$1
            local target_ip=$2
            local port=$3
            local duration=$4
            local nic_speed_gbps=$5
            local output_file=$6
            local timeout=$((duration + 10))

            local streams=$(calculate_iperf3_streams $nic_speed_gbps)

            # Use zero-copy (-Z) for better performance, 128K window, 1M buffer
            oc exec $pod -- bash -c "ulimit -l unlimited; timeout $timeout iperf3 -c $target_ip -p $port -t $duration -P $streams -w 128K -l 1M -Z > $output_file 2>&1"
          }

          # Helper function: Run iperf3 server
          # Usage: run_iperf3_server <pod> <bind_ip> <port>
          run_iperf3_server() {
            local pod=$1
            local bind_ip=$2
            local port=$3

            oc exec $pod -- bash -c "ulimit -l unlimited; nohup iperf3 -s -B $bind_ip -p $port > /tmp/iperf3_server_${port}.log 2>&1 &"
          }

          echo -e "${CYAN}==========================================="
          echo -e "Network Performance Testing"
          echo -e "===========================================${RESET}"
          echo ""

          echo -e "${BLUE}Step 1: Discovering SR-IOV networks by type...${RESET}"

          # Discover both InfiniBand and RoCE/Ethernet networks separately
          IB_NETWORKS=$(oc get sriovibnetwork -n openshift-sriov-network-operator -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo "")
          ROCE_NETWORKS=$(oc get sriovnetwork -n openshift-sriov-network-operator -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo "")

          IB_COUNT=$(echo $IB_NETWORKS | wc -w | tr -d ' ')
          ROCE_COUNT=$(echo $ROCE_NETWORKS | wc -w | tr -d ' ')

          echo "Found InfiniBand (IB) SR-IOV networks: $IB_COUNT"
          [ -n "$IB_NETWORKS" ] && echo "  $IB_NETWORKS"
          echo "Found RoCE/Ethernet SR-IOV networks: $ROCE_COUNT"
          [ -n "$ROCE_NETWORKS" ] && echo "  $ROCE_NETWORKS"

          echo ""
          echo "Discovering RDMA shared device resources..."

          # Discover RDMA shared devices from node capacity
          RDMA_RESOURCES=$(oc get nodes -o json 2>/dev/null | \
            grep -o '"rdma/rdma_shared_nic[0-9]*": "[^"]*"' | \
            grep -v ': "0"' | \
            sed 's/"rdma\/\([^"]*\)".*/\1/' | \
            sort -u || echo "")

          RDMA_COUNT=$(echo $RDMA_RESOURCES | wc -w | tr -d ' ')

          echo "Found $RDMA_COUNT RDMA shared device resources:"
          if [ "$RDMA_COUNT" -gt 0 ]; then
            for res in $RDMA_RESOURCES; do
              echo "  - rdma/$res"
            done
          else
            echo "  (None found)"
          fi

          # Use ALL available resources (both RDMA shared devices AND SR-IOV networks)
          # Build combined SR-IOV network list (IB + RoCE)
          SRIOV_NETWORKS=""
          if [ "$IB_COUNT" -gt 0 ]; then
            SRIOV_NETWORKS="$IB_NETWORKS"
          fi
          if [ "$ROCE_COUNT" -gt 0 ]; then
            if [ -n "$SRIOV_NETWORKS" ]; then
              SRIOV_NETWORKS="$SRIOV_NETWORKS $ROCE_NETWORKS"
            else
              SRIOV_NETWORKS="$ROCE_NETWORKS"
            fi
          fi

          # Check if we have at least one type of network
          TOTAL_RESOURCES=$((RDMA_COUNT + IB_COUNT + ROCE_COUNT))
          if [ "$TOTAL_RESOURCES" -eq 0 ]; then
            echo ""
            echo "ERROR: No network resources found in cluster"
            echo "Expected at least one of:"
            echo "  - RDMA shared devices (rdma/rdma_shared_nic*)"
            echo "  - SR-IOV InfiniBand networks (SriovIBNetwork)"
            echo "  - SR-IOV RoCE networks (SriovNetwork)"
            exit 1
          fi

          # Build network annotation for SR-IOV (if any)
          NETWORK_ANNOTATION=""
          if [ -n "$SRIOV_NETWORKS" ]; then
            echo ""
            echo "Attaching SR-IOV networks: $SRIOV_NETWORKS"
            for net in $SRIOV_NETWORKS; do
              if [ -z "$NETWORK_ANNOTATION" ]; then
                NETWORK_ANNOTATION="default/${net}"
              else
                NETWORK_ANNOTATION="${NETWORK_ANNOTATION},default/${net}"
              fi
            done
            echo "Network annotation: $NETWORK_ANNOTATION"
          fi

          echo ""
          echo "=========================================="
          echo "Network Resources Summary"
          echo "=========================================="
          echo "  RDMA Shared Devices: $RDMA_COUNT"
          echo "  SR-IOV IB Networks: $IB_COUNT"
          echo "  SR-IOV RoCE Networks: $ROCE_COUNT"
          echo "  Total Resources: $TOTAL_RESOURCES"
          echo ""
          echo "Test Plan:"
          if [ "$RDMA_COUNT" -gt 0 ]; then
            echo "  1. IB Bandwidth Tests (using RDMA shared devices mlx5_*)"
          fi
          if [ "$IB_COUNT" -gt 0 ] || [ "$ROCE_COUNT" -gt 0 ]; then
            echo "  2. RoCE Bandwidth Tests (using SR-IOV VFs net*)"
            echo "  3. TCP Bandwidth Tests"
          fi
          echo "  4. NCCL GPU Tests"
          echo ""

          echo -e "${BLUE}Step 2: Creating DaemonSet with all discovered network resources...${RESET}"

          # Build RDMA resource request strings for DaemonSet
          RDMA_REQUESTS=""
          RDMA_LIMITS=""
          if [ "$RDMA_COUNT" -gt 0 ]; then
            for res in $RDMA_RESOURCES; do
              RDMA_REQUESTS="${RDMA_REQUESTS}            rdma/${res}: \"1\"\n"
              RDMA_LIMITS="${RDMA_LIMITS}            rdma/${res}: \"1\"\n"
            done
          fi

          # Get template and replace placeholders
          # Use awk to inject RDMA resources after the requests/limits sections
          oc get configmap network-perf-test-daemonset-template -n default -o jsonpath='{.data.daemonset\.yaml}' | \
            sed "s|SRIOV_NETWORKS_PLACEHOLDER|$NETWORK_ANNOTATION|" | \
            awk -v rdma_req="$RDMA_REQUESTS" -v rdma_lim="$RDMA_LIMITS" '
              /^          requests:/ {
                print;
                if (rdma_req != "") printf "%s", rdma_req;
                next
              }
              /^          limits:/ {
                print;
                if (rdma_lim != "") printf "%s", rdma_lim;
                next
              }
              { print }
            ' | \
            oc apply -f - 2>/dev/null

          SRIOV_TOTAL=$((IB_COUNT + ROCE_COUNT))
          echo -e "${GREEN}✓ DaemonSet created:${RESET}"
          [ "$SRIOV_TOTAL" -gt 0 ] && echo "  - SR-IOV networks: $SRIOV_TOTAL (IB: $IB_COUNT, RoCE: $ROCE_COUNT)"
          [ "$RDMA_COUNT" -gt 0 ] && echo "  - RDMA shared devices: $RDMA_COUNT"
          echo ""

          echo -e "${BLUE}Step 3: Waiting for worker pods to be ready...${RESET}"
          echo "Note: The container image is large (~10GB), this may take 5-10 minutes..."
          echo ""

          # Wait up to 15 minutes for pods to be ready
          for i in {1..90}; do
            # Get all pods, excluding those being deleted
            ALL_PODS=$(oc get pods -l app=network-perf-test-worker --no-headers 2>/dev/null)

            # Count total pods (exclude Terminating)
            TOTAL_COUNT=$(echo "$ALL_PODS" | grep -v "Terminating" | wc -l | tr -d ' ')
            [ -z "$TOTAL_COUNT" ] && TOTAL_COUNT=0

            # Count ready pods (1/1 and Running)
            READY_COUNT=$(echo "$ALL_PODS" | grep -v "Terminating" | grep "Running" | grep "1/1" | wc -l | tr -d ' ')
            [ -z "$READY_COUNT" ] && READY_COUNT=0

            echo "  Ready: $READY_COUNT/$TOTAL_COUNT pods (check ${i}/90)"

            # Break if we have at least 2 pods ready and all current pods are ready
            if [ "$READY_COUNT" -ge 2 ] 2>/dev/null && [ "$READY_COUNT" -eq "$TOTAL_COUNT" ] 2>/dev/null && [ "$TOTAL_COUNT" -gt 0 ] 2>/dev/null; then
              echo "  All pods ready!"
              break
            fi

            sleep 10
          done

          echo ""

          # Get list of worker pods
          WORKER_PODS=$(oc get pods -l app=network-perf-test-worker -o jsonpath='{.items[*].metadata.name}')
          POD_COUNT=$(echo $WORKER_PODS | wc -w)

          if [ "$POD_COUNT" -lt 2 ]; then
            echo "ERROR: Need at least 2 worker pods, found $POD_COUNT"
            echo "Worker pods: $WORKER_PODS"
            exit 1
          fi

          echo -e "${GREEN}Found $POD_COUNT worker pods ready for testing${RESET}"
          echo "Worker pods: $WORKER_PODS"
          echo ""

          # Convert to array
          PODS=($WORKER_PODS)

          # Check IOMMU status on all worker nodes
          echo -e "${BLUE}Checking IOMMU status on worker nodes...${RESET}"
          IOMMU_ENABLED_NODES=()
          for pod in ${PODS[@]}; do
            # Check if IOMMU is enabled by looking for iommu_groups
            IOMMU_CHECK=$(oc exec $pod -- bash -c "ls -d /sys/kernel/iommu_groups/* 2>/dev/null | wc -l" 2>/dev/null || echo "0")
            IOMMU_CHECK=$(echo "$IOMMU_CHECK" | tr -d '\n' | tr -d ' ')

            if [ "$IOMMU_CHECK" != "0" ] && [ -n "$IOMMU_CHECK" ]; then
              NODE=$(echo $pod | sed 's/network-perf-test-worker-//')
              echo "⚠️  IOMMU is ENABLED on node: $NODE (detected $IOMMU_CHECK iommu groups)"
              IOMMU_ENABLED_NODES+=($NODE)
            fi
          done

          if [ ${#IOMMU_ENABLED_NODES[@]} -eq 0 ]; then
            echo "✓ IOMMU is disabled on all nodes (required for GPUDirect RDMA)"
          else
            echo ""
            echo -e "${YELLOW}WARNING: IOMMU is enabled on ${#IOMMU_ENABLED_NODES[@]} node(s)${RESET}"
            echo "IOMMU must be disabled in BIOS for GPUDirect RDMA to function."
            echo "This will cause RDMA+CUDA (GPUDirect) tests to be skipped on affected nodes."
            echo "Affected nodes: ${IOMMU_ENABLED_NODES[@]}"
          fi
          echo ""

          echo ""
          echo -e "${CYAN}=========================================="
          echo -e "Network Performance Tests"
          echo -e "==========================================${RESET}"
          echo ""
          echo -e "${BOLD}Test Suite Overview:${RESET}"
          echo ""
          echo "Testing 4MB RDMA transfers with ${TEST_DURATION} second duration"
          echo ""
          echo "Test Types:"
          echo "  - RoCE:            RDMA over Converged Ethernet (system memory)"
          echo "  - RoCE+CUDA:       RDMA with GPUDirect (GPU memory)"
          echo "  - Sequential:      One NIC at a time (baseline performance)"
          echo "  - Parallel:        All NICs simultaneously (real-world usage)"
          echo "  - TCP:             Baseline TCP/IP comparison (iperf3)"
          echo ""
          echo "=========================================="
          echo ""

          # Detect all available SR-IOV interfaces on first pod
          FIRST_POD=${PODS[0]}
          SRIOV_NICS=$(oc exec $FIRST_POD -- bash -c "ip -br addr show | grep '^net' | awk '{print \$1}'" 2>/dev/null || echo "")
          SRIOV_NICS=$(echo "$SRIOV_NICS" | tr '\n' ' ' | sed 's/ *$//')

          if [ -z "$SRIOV_NICS" ]; then
            echo "WARNING: No SR-IOV interfaces found (net1, net2, etc.)"
            echo "Checking network interfaces on $FIRST_POD:"
            oc exec $FIRST_POD -- ip -br addr show 2>&1 | head -10
            SRIOV_NICS="net1"  # Fallback
          fi

          echo "Detected SR-IOV interfaces: $SRIOV_NICS"
          echo "Testing unidirectional connectivity (source pod → all target pods)"
          echo ""

          # Detect active RDMA devices on all pods
          echo "Detecting active RDMA devices on pods..."
          declare -A POD_RDMA_DEVICES
          for pod in ${PODS[@]}; do
            # Only get devices with PORT_ACTIVE state
            ACTIVE_DEVICES=$(oc exec $pod -- bash -c '
              for dev in $(ibv_devices 2>/dev/null | grep "mlx5_" | awk "{print \$1}"); do
                if ibv_devinfo -d $dev 2>/dev/null | grep -q "PORT_ACTIVE"; then
                  echo $dev
                fi
              done
            ' 2>/dev/null | tr '\n' ' ')
            POD_RDMA_DEVICES[$pod]="$ACTIVE_DEVICES"
            echo "  $pod: ${ACTIVE_DEVICES:-None}"
          done
          echo ""

          # Use first pod as source, test to all other pods (unidirectional)
          SOURCE_POD=${PODS[0]}
          tested_targets=0

          echo "Source pod: $SOURCE_POD"
          echo ""

          # Results are stored directly in SQLite database

          for j in "${!PODS[@]}"; do
            if [ $j -ne 0 ]; then
              TARGET_POD=${PODS[$j]}

              echo "Testing: $SOURCE_POD → $TARGET_POD"

              # Kill any existing ulimit -l unlimited && ib_write_bw processes
              oc exec $SOURCE_POD -- pkill -9 ib_write_bw 2>/dev/null || true
              oc exec $TARGET_POD -- pkill -9 ib_write_bw 2>/dev/null || true
              sleep 2

              # Detect GPU models on both pods
              SOURCE_GPUS=$(oc exec $SOURCE_POD -- bash -c "nvidia-smi --query-gpu=gpu_name --format=csv,noheader 2>/dev/null | paste -sd ',' -" || echo "N/A")
              SOURCE_GPUS=$(echo "$SOURCE_GPUS" | tr -d '\n')
              TARGET_GPUS=$(oc exec $TARGET_POD -- bash -c "nvidia-smi --query-gpu=gpu_name --format=csv,noheader 2>/dev/null | paste -sd ',' -" || echo "N/A")
              TARGET_GPUS=$(echo "$TARGET_GPUS" | tr -d '\n')

              # Collect NIC configuration for all interfaces
              declare -A NIC_SOURCE_IPS
              declare -A NIC_TARGET_IPS
              declare -A NIC_SOURCE_RDMA_DEVS
              declare -A NIC_TARGET_RDMA_DEVS
              declare -A NIC_RDMA_PHYS_PORTS
              declare -A NIC_SPEEDS
              declare -A NIC_HOST_SEQ_GBPS
              declare -A NIC_GPU_SEQ_GBPS
              declare -A NIC_HOST_PAR_GBPS
              declare -A NIC_GPU_PAR_GBPS
              declare -A NIC_HOST_SEQ_ITERS
              declare -A NIC_GPU_SEQ_ITERS
              declare -A NIC_HOST_PAR_ITERS
              declare -A NIC_GPU_PAR_ITERS
              declare -a VALID_NICS=()

              for NIC in $SRIOV_NICS; do
                # Get IP addresses for this specific NIC
                SOURCE_IP=$(oc exec $SOURCE_POD -- bash -c "ip -4 addr show $NIC 2>/dev/null | grep 'inet ' | awk '{print \$2}' | cut -d/ -f1" 2>/dev/null || echo "")
                SOURCE_IP=$(echo "$SOURCE_IP" | tr -d '\n' | tr -d ' ')
                TARGET_IP=$(oc exec $TARGET_POD -- bash -c "ip -4 addr show $NIC 2>/dev/null | grep 'inet ' | awk '{print \$2}' | cut -d/ -f1" 2>/dev/null || echo "")
                TARGET_IP=$(echo "$TARGET_IP" | tr -d '\n' | tr -d ' ')

                if [ -z "$SOURCE_IP" ] || [ -z "$TARGET_IP" ]; then
                  echo "  [$NIC] ⚠ No IP - skipping"
                  continue
                fi

                # Get RDMA device for this NIC on SOURCE pod by matching PCI address
                # This ensures correct mlx5_X to IP correlation
                NIC_PCI=$(oc exec $SOURCE_POD -- bash -c "readlink -f /sys/class/net/$NIC/device 2>/dev/null | xargs basename" 2>/dev/null || echo "")
                NIC_PCI=$(echo "$NIC_PCI" | tr -d '\n' | tr -d ' ')

                SOURCE_RDMA_DEV=""
                if [ -n "$NIC_PCI" ]; then
                  # Find RDMA device with matching PCI address
                  SOURCE_RDMA_DEV=$(oc exec $SOURCE_POD -- bash -c "for dev in /sys/class/infiniband/mlx*; do dev_pci=\$(readlink -f \$dev/device 2>/dev/null | xargs basename); if [ \"\$dev_pci\" = \"$NIC_PCI\" ]; then basename \$dev; break; fi; done" 2>/dev/null || echo "")
                fi

                # Fallback to GUID matching if PCI method failed
                if [ -z "$SOURCE_RDMA_DEV" ]; then
                  NIC_GUID=$(oc exec $SOURCE_POD -- bash -c "cat /sys/class/net/$NIC/device/infiniband/*/node_guid 2>/dev/null | head -1" || echo "")
                  NIC_GUID=$(echo "$NIC_GUID" | tr -d '\n' | tr -d ' ')
                  if [ -n "$NIC_GUID" ]; then
                    SOURCE_RDMA_DEV=$(oc exec $SOURCE_POD -- bash -c "for dev in /sys/class/infiniband/mlx*; do if grep -q '$NIC_GUID' \$dev/node_guid 2>/dev/null; then basename \$dev; break; fi; done" || echo "")
                  fi
                fi

                # Final fallback to first device
                if [ -z "$SOURCE_RDMA_DEV" ]; then
                  SOURCE_RDMA_DEV=$(oc exec $SOURCE_POD -- bash -c "ibv_devices | grep 'mlx' | head -1 | awk '{print \$1}'" 2>/dev/null || echo "mlx5_0")
                fi
                SOURCE_RDMA_DEV=$(echo "$SOURCE_RDMA_DEV" | tr -d '\n' | tr -d ' ')

                # Get RDMA device for this NIC on TARGET pod (device numbers differ per node!)
                NIC_PCI_TARGET=$(oc exec $TARGET_POD -- bash -c "readlink -f /sys/class/net/$NIC/device 2>/dev/null | xargs basename" 2>/dev/null || echo "")
                NIC_PCI_TARGET=$(echo "$NIC_PCI_TARGET" | tr -d '\n' | tr -d ' ')

                TARGET_RDMA_DEV=""
                if [ -n "$NIC_PCI_TARGET" ]; then
                  TARGET_RDMA_DEV=$(oc exec $TARGET_POD -- bash -c "for dev in /sys/class/infiniband/mlx*; do dev_pci=\$(readlink -f \$dev/device 2>/dev/null | xargs basename); if [ \"\$dev_pci\" = \"$NIC_PCI_TARGET\" ]; then basename \$dev; break; fi; done" 2>/dev/null || echo "")
                fi

                # Fallback to GUID matching if PCI method failed
                if [ -z "$TARGET_RDMA_DEV" ]; then
                  NIC_GUID_TARGET=$(oc exec $TARGET_POD -- bash -c "cat /sys/class/net/$NIC/device/infiniband/*/node_guid 2>/dev/null | head -1" || echo "")
                  NIC_GUID_TARGET=$(echo "$NIC_GUID_TARGET" | tr -d '\n' | tr -d ' ')
                  if [ -n "$NIC_GUID_TARGET" ]; then
                    TARGET_RDMA_DEV=$(oc exec $TARGET_POD -- bash -c "for dev in /sys/class/infiniband/mlx*; do if grep -q '$NIC_GUID_TARGET' \$dev/node_guid 2>/dev/null; then basename \$dev; break; fi; done" || echo "")
                  fi
                fi

                # Final fallback to first device
                if [ -z "$TARGET_RDMA_DEV" ]; then
                  TARGET_RDMA_DEV=$(oc exec $TARGET_POD -- bash -c "ibv_devices | grep 'mlx' | head -1 | awk '{print \$1}'" 2>/dev/null || echo "mlx5_0")
                fi
                TARGET_RDMA_DEV=$(echo "$TARGET_RDMA_DEV" | tr -d '\n' | tr -d ' ')

                # Detect physical port count for dual-port HCA support
                PHYS_PORTS=$(oc exec $SOURCE_POD -- bash -c "ibv_devinfo -d $SOURCE_RDMA_DEV 2>/dev/null | grep 'phys_port_cnt:' | awk '{print \$2}'" 2>/dev/null || echo "1")
                PHYS_PORTS=$(echo "$PHYS_PORTS" | tr -d '\n' | tr -d ' ')
                [ -z "$PHYS_PORTS" ] && PHYS_PORTS="1"

                # Get NIC speed and lanes from ethtool
                NIC_SPEED_MBPS=$(oc exec $SOURCE_POD -- bash -c "ethtool $NIC 2>/dev/null | grep 'Speed:' | awk '{print \$2}' | sed 's/Mb\/s//'" 2>/dev/null || echo "")
                NIC_SPEED_MBPS=$(echo "$NIC_SPEED_MBPS" | tr -d '\n' | tr -d ' ')
                NIC_LANES=$(oc exec $SOURCE_POD -- bash -c "ethtool $NIC 2>/dev/null | grep 'Lanes:' | awk '{print \$2}'" 2>/dev/null || echo "")
                NIC_LANES=$(echo "$NIC_LANES" | tr -d '\n' | tr -d ' ')

                # Convert Mb/s to Gb/s (only if numeric)
                if [ -n "$NIC_SPEED_MBPS" ] && [[ "$NIC_SPEED_MBPS" =~ ^[0-9]+$ ]]; then
                  NIC_SPEED_GBPS=$(awk "BEGIN {printf \"%.0f\", $NIC_SPEED_MBPS / 1000}")
                else
                  NIC_SPEED_GBPS="Unknown"
                fi

                # Skip NICs with unknown speed (link likely not connected)
                if [ "$NIC_SPEED_GBPS" = "Unknown" ]; then
                  echo "  [$NIC] ⚠ Unknown speed - skipping (link may not be connected)"
                  continue
                fi

                # Store configuration
                NIC_SOURCE_IPS[$NIC]=$SOURCE_IP
                NIC_TARGET_IPS[$NIC]=$TARGET_IP
                NIC_SOURCE_RDMA_DEVS[$NIC]=$SOURCE_RDMA_DEV
                NIC_TARGET_RDMA_DEVS[$NIC]=$TARGET_RDMA_DEV
                NIC_RDMA_PHYS_PORTS[$NIC]=$PHYS_PORTS
                NIC_SPEEDS[$NIC]=$NIC_SPEED_GBPS
                VALID_NICS+=($NIC)

                # Display configuration with dual-port indicator
                DUALPORT_INDICATOR=""
                [ "$PHYS_PORTS" -eq 2 ] 2>/dev/null && DUALPORT_INDICATOR=" [dual-port]"

                if [ -n "$NIC_LANES" ]; then
                  echo "  [$NIC] $SOURCE_IP ($SOURCE_RDMA_DEV) → $TARGET_IP ($TARGET_RDMA_DEV) - ${NIC_SPEED_GBPS}G/${NIC_LANES}-lane${DUALPORT_INDICATOR}"
                else
                  echo "  [$NIC] $SOURCE_IP ($SOURCE_RDMA_DEV) → $TARGET_IP ($TARGET_RDMA_DEV) - ${NIC_SPEED_GBPS}G${DUALPORT_INDICATOR}"
                fi
              done

              # Test 4MB messages only
              SIZE_LABEL="4MB"
              MSG_SIZE=4194304

              # Get node names for database
              SOURCE_NODE=$(oc get pod $SOURCE_POD -o jsonpath='{.spec.nodeName}' 2>/dev/null)
              TARGET_NODE=$(oc get pod $TARGET_POD -o jsonpath='{.spec.nodeName}' 2>/dev/null)

              # Test 1: InfiniBand Tests (only if we have RDMA shared devices)
              # RDMA_COUNT was detected earlier in the script
              if [ "$RDMA_COUNT" -gt 0 ] && [ ${#VALID_NICS[@]} -eq 0 ]; then
                echo ""
                echo -e "${CYAN}=========================================="
                echo -e "Test 1: InfiniBand Bandwidth Tests"
                echo -e "==========================================${RESET}"
                echo ""
                echo "Testing RDMA bandwidth using ib_write_bw"
                echo "Message size: 4MB, Duration: ${TEST_DURATION}s"
                echo ""
                echo "Network Type: InfiniBand (native IB transport)"
                echo ""

                # Use RDMA shared devices directly (InfiniBand native mode)
                echo ""
                echo -e "${YELLOW}Using RDMA shared devices (mlx5_*) for InfiniBand tests${RESET}"
                echo ""

                # Get active RDMA devices for both pods
                SOURCE_ACTIVE_DEVS=(${POD_RDMA_DEVICES[$SOURCE_POD]})
                TARGET_ACTIVE_DEVS=(${POD_RDMA_DEVICES[$TARGET_POD]})

                if [ ${#SOURCE_ACTIVE_DEVS[@]} -eq 0 ] || [ ${#TARGET_ACTIVE_DEVS[@]} -eq 0 ]; then
                  echo "ERROR: No active RDMA devices found on pods"
                  echo "  Source pod $SOURCE_POD: ${SOURCE_ACTIVE_DEVS[@]:-None}"
                  echo "  Target pod $TARGET_POD: ${TARGET_ACTIVE_DEVS[@]:-None}"
                else
                  echo "Active RDMA devices:"
                  echo "  Source pod $SOURCE_POD: ${SOURCE_ACTIVE_DEVS[@]}"
                  echo "  Target pod $TARGET_POD: ${TARGET_ACTIVE_DEVS[@]}"
                  echo ""

                  # Build GPU-NIC affinity map for optimal GPUDirect performance
                  echo "Building GPU-NIC topology database..."

                  # Parse nvidia-smi topology and store in database
                  TOPO_OUTPUT=$(oc exec $SOURCE_POD -- nvidia-smi topo -m 2>/dev/null || echo "")
                  if [ -n "$TOPO_OUTPUT" ]; then
                    # Extract NIC legend (NIC0: mlx5_0, etc.) and build mapping
                    declare -A NIC_NUM_TO_DEV
                    while IFS= read -r line; do
                      if [[ $line =~ NIC([0-9]+):[[:space:]]+(mlx5_[0-9]+) ]]; then
                        NIC_NUM_TO_DEV["${BASH_REMATCH[1]}"]="${BASH_REMATCH[2]}"
                      fi
                    done <<< "$TOPO_OUTPUT"

                    # Parse GPU rows and store all GPU-NIC connections in database
                    while IFS= read -r gpu_line; do
                      if [[ $gpu_line =~ ^GPU([0-9]+) ]]; then
                        GPU_NUM="${BASH_REMATCH[1]}"
                        # Extract connection types for each NIC
                        for nic_idx in "${!NIC_NUM_TO_DEV[@]}"; do
                          NIC_DEV="${NIC_NUM_TO_DEV[$nic_idx]}"
                          COL_IDX=$((9 + nic_idx))
                          CONN=$(echo "$gpu_line" | awk -v col=$COL_IDX '{print $col}')

                          # Store in database
                          if [ -n "$CONN" ] && [ "$CONN" != "X" ]; then
                            sqlite3 "$DB_FILE" "INSERT INTO gpu_nic_topology (test_run_id, pod_name, node_name, nic_device, gpu_id, connection_type, timestamp) VALUES ('$TEST_RUN_ID', '$SOURCE_POD', '$SOURCE_NODE', '$NIC_DEV', $GPU_NUM, '$CONN', $(date +%s));" 2>/dev/null || true
                          fi
                        done
                      fi
                    done <<< "$TOPO_OUTPUT"

                    # Display PXB (optimal) mappings for source pod
                    echo "Optimal GPU-NIC mappings for $SOURCE_POD (PXB connections):"
                    sqlite3 -separator ' → ' "$DB_FILE" "SELECT DISTINCT nic_device, 'GPU' || gpu_id || ' (' || connection_type || ')' FROM gpu_nic_topology WHERE test_run_id = '$TEST_RUN_ID' AND pod_name = '$SOURCE_POD' AND connection_type = 'PXB' ORDER BY nic_device;"
                  fi

                  # Build GPU-NIC topology for TARGET pod
                  TOPO_OUTPUT=$(oc exec $TARGET_POD -- nvidia-smi topo -m 2>/dev/null || echo "")
                  if [ -n "$TOPO_OUTPUT" ]; then
                    # Extract NIC legend (NIC0: mlx5_0, etc.) and build mapping
                    declare -A NIC_NUM_TO_DEV_TARGET
                    while IFS= read -r line; do
                      if [[ $line =~ NIC([0-9]+):[[:space:]]+(mlx5_[0-9]+) ]]; then
                        NIC_NUM_TO_DEV_TARGET["${BASH_REMATCH[1]}"]="${BASH_REMATCH[2]}"
                      fi
                    done <<< "$TOPO_OUTPUT"

                    # Parse GPU rows and store all GPU-NIC connections in database for target pod
                    while IFS= read -r gpu_line; do
                      if [[ $gpu_line =~ ^GPU([0-9]+) ]]; then
                        GPU_NUM="${BASH_REMATCH[1]}"
                        # Extract connection types for each NIC
                        for nic_idx in "${!NIC_NUM_TO_DEV_TARGET[@]}"; do
                          NIC_DEV="${NIC_NUM_TO_DEV_TARGET[$nic_idx]}"
                          COL_IDX=$((9 + nic_idx))
                          CONN=$(echo "$gpu_line" | awk -v col=$COL_IDX '{print $col}')

                          # Store in database
                          if [ -n "$CONN" ] && [ "$CONN" != "X" ]; then
                            sqlite3 "$DB_FILE" "INSERT INTO gpu_nic_topology (test_run_id, pod_name, node_name, nic_device, gpu_id, connection_type, timestamp) VALUES ('$TEST_RUN_ID', '$TARGET_POD', '$TARGET_NODE', '$NIC_DEV', $GPU_NUM, '$CONN', $(date +%s));" 2>/dev/null || true
                          fi
                        done
                      fi
                    done <<< "$TOPO_OUTPUT"

                    # Display PXB (optimal) mappings for target pod
                    echo "Optimal GPU-NIC mappings for $TARGET_POD (PXB connections):"
                    sqlite3 -separator ' → ' "$DB_FILE" "SELECT DISTINCT nic_device, 'GPU' || gpu_id || ' (' || connection_type || ')' FROM gpu_nic_topology WHERE test_run_id = '$TEST_RUN_ID' AND pod_name = '$TARGET_POD' AND connection_type = 'PXB' ORDER BY nic_device;"
                  fi
                  echo ""

                  # Sequential tests - one device at a time
                  echo ""
                  echo -e "${MAGENTA}=========================================="
                  echo -e "  SEQUENTIAL Tests (one device at a time)"
                  echo -e "==========================================${RESET}"
                  echo ""

                  for i in "${!SOURCE_ACTIVE_DEVS[@]}"; do
                    if [ $i -ge ${#TARGET_ACTIVE_DEVS[@]} ]; then
                      break
                    fi

                    SOURCE_RDMA_DEV="${SOURCE_ACTIVE_DEVS[$i]}"
                    TARGET_RDMA_DEV="${TARGET_ACTIVE_DEVS[$i]}"

                    echo "  Testing [$SOURCE_RDMA_DEV → $TARGET_RDMA_DEV] sequentially..."

                    # IB test (system memory)
                    echo "    IB test (host memory)..."
                    oc exec $SOURCE_POD -- pkill -9 ib_write_bw 2>/dev/null || true
                    oc exec $TARGET_POD -- pkill -9 ib_write_bw 2>/dev/null || true
                    sleep 2

                    # Start server on target
                    oc exec $TARGET_POD -- bash -c "ulimit -l unlimited; nohup ib_write_bw -d $TARGET_RDMA_DEV -s $MSG_SIZE -D $TEST_DURATION -F --report_gbits -q 2 > /tmp/ib_host_${TARGET_RDMA_DEV}_seq.log 2>&1 &"
                    sleep 3

                    # Get target IP
                    TARGET_IP=$(oc get pod $TARGET_POD -o jsonpath='{.status.podIP}')

                    # Run client from source
                    oc exec $SOURCE_POD -- bash -c "ulimit -l unlimited; timeout $TEST_TIMEOUT ib_write_bw -d $SOURCE_RDMA_DEV -s $MSG_SIZE -D $TEST_DURATION -F --report_gbits -q 2 $TARGET_IP > /tmp/ib_host_${SOURCE_RDMA_DEV}_seq_result.log 2>&1"
                    HOST_RESULT=$(oc exec $SOURCE_POD -- bash -c "cat /tmp/ib_host_${SOURCE_RDMA_DEV}_seq_result.log 2>/dev/null | grep '$MSG_SIZE' | grep -v '#' | tail -1" || echo "")

                    if [ -n "$HOST_RESULT" ]; then
                      HOST_SEQ_GBPS=$(echo "$HOST_RESULT" | awk '{print $4}')
                      HOST_SEQ_ITERS=$(echo "$HOST_RESULT" | awk '{print $2}')
                      HOST_SEQ_STATUS="PASS"
                      [ "$HOST_SEQ_ITERS" -gt 1000 ] 2>/dev/null && HOST_SEQ_STATUS="PASS" || HOST_SEQ_STATUS="FAIL"
                      echo -e "      ${GREEN}Result: $HOST_SEQ_GBPS Gb/s ($HOST_SEQ_ITERS iters) - $HOST_SEQ_STATUS${RESET}"

                      # Store in database
                      sqlite3 "$DB_FILE" "INSERT INTO ib_results (test_run_id, source_pod, target_pod, source_node, target_node, source_gpu, target_gpu, nic_interface, rdma_device_source, rdma_device_target, link_speed_gbps, message_size, test_mode, memory_type, bandwidth_gbps, iterations, test_status, timestamp) VALUES ('$TEST_RUN_ID', '$SOURCE_POD', '$TARGET_POD', '$SOURCE_NODE', '$TARGET_NODE', '$SOURCE_GPUS', '$TARGET_GPUS', 'N/A', '$SOURCE_RDMA_DEV', '$TARGET_RDMA_DEV', 0, $MSG_SIZE, 'sequential', 'host', ${HOST_SEQ_GBPS:-0.0}, ${HOST_SEQ_ITERS:-0}, '$HOST_SEQ_STATUS', $(date +%s));" 2>/dev/null || true
                    else
                      echo -e "      ${RED}Result: FAIL${RESET}"
                      HOST_SEQ_GBPS="0.0"
                      HOST_SEQ_ITERS="0"
                      HOST_SEQ_STATUS="FAIL"
                      sqlite3 "$DB_FILE" "INSERT INTO ib_results (test_run_id, source_pod, target_pod, source_node, target_node, source_gpu, target_gpu, nic_interface, rdma_device_source, rdma_device_target, link_speed_gbps, message_size, test_mode, memory_type, bandwidth_gbps, iterations, test_status, timestamp) VALUES ('$TEST_RUN_ID', '$SOURCE_POD', '$TARGET_POD', '$SOURCE_NODE', '$TARGET_NODE', '$SOURCE_GPUS', '$TARGET_GPUS', 'N/A', '$SOURCE_RDMA_DEV', '$TARGET_RDMA_DEV', 0, $MSG_SIZE, 'sequential', 'host', 0.0, 0, 'FAIL', $(date +%s));" 2>/dev/null || true
                    fi

                    oc exec $SOURCE_POD -- pkill -9 ib_write_bw 2>/dev/null || true
                    oc exec $TARGET_POD -- pkill -9 ib_write_bw 2>/dev/null || true
                    sleep 2

                    # IB+CUDA test (GPU memory) - GPUDirect RDMA
                    echo "    IB+CUDA test (GPUDirect RDMA)..."

                    # Check if GPUs are available and IOMMU is disabled
                    SOURCE_GPU_CHECK=$(oc exec $SOURCE_POD -- bash -c "nvidia-smi -L 2>/dev/null | head -1" || echo "")
                    TARGET_GPU_CHECK=$(oc exec $TARGET_POD -- bash -c "nvidia-smi -L 2>/dev/null | head -1" || echo "")
                    SOURCE_IOMMU_OK=true
                    TARGET_IOMMU_OK=true
                    for node in "${IOMMU_ENABLED_NODES[@]}"; do
                      if [[ "$SOURCE_NODE" == *"$node"* ]]; then SOURCE_IOMMU_OK=false; fi
                      if [[ "$TARGET_NODE" == *"$node"* ]]; then TARGET_IOMMU_OK=false; fi
                    done

                    if [ -n "$SOURCE_GPU_CHECK" ] && [ -n "$TARGET_GPU_CHECK" ] && [ "$SOURCE_IOMMU_OK" = true ] && [ "$TARGET_IOMMU_OK" = true ]; then
                      # Get optimal GPU for this NIC from topology database (prefer PXB, fallback to 0)
                      SOURCE_GPU_ID=$(sqlite3 "$DB_FILE" "SELECT gpu_id FROM gpu_nic_topology WHERE test_run_id = '$TEST_RUN_ID' AND pod_name = '$SOURCE_POD' AND nic_device = '$SOURCE_RDMA_DEV' AND connection_type = 'PXB' LIMIT 1;" 2>/dev/null || echo "0")
                      TARGET_GPU_ID=$(sqlite3 "$DB_FILE" "SELECT gpu_id FROM gpu_nic_topology WHERE test_run_id = '$TEST_RUN_ID' AND pod_name = '$TARGET_POD' AND nic_device = '$TARGET_RDMA_DEV' AND connection_type = 'PXB' LIMIT 1;" 2>/dev/null || echo "0")
                      SOURCE_GPU_ID=${SOURCE_GPU_ID:-0}
                      TARGET_GPU_ID=${TARGET_GPU_ID:-0}

                      # Start server on target with GPU memory
                      oc exec $TARGET_POD -- bash -c "ulimit -l unlimited; nohup ib_write_bw -d $TARGET_RDMA_DEV -s $MSG_SIZE -D $TEST_DURATION -F --report_gbits -q 2 --use_cuda=$TARGET_GPU_ID > /tmp/ib_gpu_${TARGET_RDMA_DEV}_seq.log 2>&1 &"
                      sleep 3

                      # Run client from source with GPU memory
                      oc exec $SOURCE_POD -- bash -c "ulimit -l unlimited; timeout $TEST_TIMEOUT ib_write_bw -d $SOURCE_RDMA_DEV -s $MSG_SIZE -D $TEST_DURATION -F --report_gbits -q 2 --use_cuda=$SOURCE_GPU_ID $TARGET_IP > /tmp/ib_gpu_${SOURCE_RDMA_DEV}_seq_result.log 2>&1"
                      GPU_RESULT=$(oc exec $SOURCE_POD -- bash -c "cat /tmp/ib_gpu_${SOURCE_RDMA_DEV}_seq_result.log 2>/dev/null | grep '$MSG_SIZE' | grep -v '#' | tail -1" || echo "")

                      if [ -n "$GPU_RESULT" ]; then
                        GPU_SEQ_GBPS=$(echo "$GPU_RESULT" | awk '{print $4}')
                        GPU_SEQ_ITERS=$(echo "$GPU_RESULT" | awk '{print $2}')
                        GPU_SEQ_STATUS="PASS"
                        [ "$GPU_SEQ_ITERS" -gt 1000 ] 2>/dev/null && GPU_SEQ_STATUS="PASS" || GPU_SEQ_STATUS="FAIL"
                        echo -e "      ${GREEN}Result: $GPU_SEQ_GBPS Gb/s ($GPU_SEQ_ITERS iters) - $GPU_SEQ_STATUS${RESET}"

                        # Store in database
                        sqlite3 "$DB_FILE" "INSERT INTO ib_results (test_run_id, source_pod, target_pod, source_node, target_node, source_gpu, target_gpu, nic_interface, rdma_device_source, rdma_device_target, link_speed_gbps, message_size, test_mode, memory_type, bandwidth_gbps, iterations, test_status, timestamp) VALUES ('$TEST_RUN_ID', '$SOURCE_POD', '$TARGET_POD', '$SOURCE_NODE', '$TARGET_NODE', '$SOURCE_GPUS', '$TARGET_GPUS', 'N/A', '$SOURCE_RDMA_DEV', '$TARGET_RDMA_DEV', 0, $MSG_SIZE, 'sequential', 'gpu', ${GPU_SEQ_GBPS:-0.0}, ${GPU_SEQ_ITERS:-0}, '$GPU_SEQ_STATUS', $(date +%s));" 2>/dev/null || true
                      else
                        echo -e "      ${RED}Result: FAIL${RESET}"
                        GPU_SEQ_GBPS="0.0"
                        GPU_SEQ_ITERS="0"
                        GPU_SEQ_STATUS="FAIL"
                        sqlite3 "$DB_FILE" "INSERT INTO ib_results (test_run_id, source_pod, target_pod, source_node, target_node, source_gpu, target_gpu, nic_interface, rdma_device_source, rdma_device_target, link_speed_gbps, message_size, test_mode, memory_type, bandwidth_gbps, iterations, test_status, timestamp) VALUES ('$TEST_RUN_ID', '$SOURCE_POD', '$TARGET_POD', '$SOURCE_NODE', '$TARGET_NODE', '$SOURCE_GPUS', '$TARGET_GPUS', 'N/A', '$SOURCE_RDMA_DEV', '$TARGET_RDMA_DEV', 0, $MSG_SIZE, 'sequential', 'gpu', 0.0, 0, 'FAIL', $(date +%s));" 2>/dev/null || true
                      fi
                    else
                      # Skip GPU tests
                      SKIP_REASON=""
                      if [ -z "$SOURCE_GPU_CHECK" ] || [ -z "$TARGET_GPU_CHECK" ]; then
                        SKIP_REASON="GPUs not available"
                      elif [ "$SOURCE_IOMMU_OK" = false ] || [ "$TARGET_IOMMU_OK" = false ]; then
                        SKIP_REASON="IOMMU enabled"
                      fi
                      echo -e "      ${YELLOW}SKIPPED - $SKIP_REASON${RESET}"
                      sqlite3 "$DB_FILE" "INSERT INTO ib_results (test_run_id, source_pod, target_pod, source_node, target_node, source_gpu, target_gpu, nic_interface, rdma_device_source, rdma_device_target, link_speed_gbps, message_size, test_mode, memory_type, bandwidth_gbps, iterations, test_status, timestamp) VALUES ('$TEST_RUN_ID', '$SOURCE_POD', '$TARGET_POD', '$SOURCE_NODE', '$TARGET_NODE', '$SOURCE_GPUS', '$TARGET_GPUS', 'N/A', '$SOURCE_RDMA_DEV', '$TARGET_RDMA_DEV', 0, $MSG_SIZE, 'sequential', 'gpu', 0.0, 0, 'SKIPPED', $(date +%s));" 2>/dev/null || true
                    fi

                    oc exec $SOURCE_POD -- pkill -9 ib_write_bw 2>/dev/null || true
                    oc exec $TARGET_POD -- pkill -9 ib_write_bw 2>/dev/null || true
                    echo ""
                  done

                  # Parallel tests - all devices simultaneously
                  echo ""
                  echo -e "${MAGENTA}=========================================="
                  echo -e "  PARALLEL Tests (all devices simultaneously)"
                  echo -e "==========================================${RESET}"
                  echo ""

                  echo "  Running IB tests on ALL devices in parallel (host memory)..."

                  # Start servers on all devices
                  PORT=18515
                  for i in "${!SOURCE_ACTIVE_DEVS[@]}"; do
                    if [ $i -ge ${#TARGET_ACTIVE_DEVS[@]} ]; then
                      break
                    fi
                    TARGET_RDMA_DEV="${TARGET_ACTIVE_DEVS[$i]}"
                    oc exec $TARGET_POD -- bash -c "ulimit -l unlimited; nohup ib_write_bw -d $TARGET_RDMA_DEV -p $PORT -s $MSG_SIZE -D $TEST_DURATION -F --report_gbits -q 1 > /tmp/ib_host_${TARGET_RDMA_DEV}_par.log 2>&1 &"
                    PORT=$((PORT + 1))
                  done
                  sleep 3

                  # Start clients on all devices in parallel
                  CLIENT_CMD="set +m; "
                  PORT=18515
                  TARGET_IP=$(oc get pod $TARGET_POD -o jsonpath='{.status.podIP}')
                  for i in "${!SOURCE_ACTIVE_DEVS[@]}"; do
                    if [ $i -ge ${#TARGET_ACTIVE_DEVS[@]} ]; then
                      break
                    fi
                    SOURCE_RDMA_DEV="${SOURCE_ACTIVE_DEVS[$i]}"
                    CLIENT_CMD="${CLIENT_CMD}(ulimit -l unlimited; timeout $TEST_TIMEOUT ib_write_bw -d $SOURCE_RDMA_DEV -p $PORT -s $MSG_SIZE -D $TEST_DURATION -F --report_gbits -q 1 $TARGET_IP > /tmp/ib_host_${SOURCE_RDMA_DEV}_par_result.log 2>&1) & "
                    PORT=$((PORT + 1))
                  done
                  CLIENT_CMD="${CLIENT_CMD}wait"
                  oc exec $SOURCE_POD -- bash -c "$CLIENT_CMD" &
                  EXEC_PID=$!
                  sleep 2

                  # Wait for tests to complete
                  echo "  Waiting for IB tests to complete..."
                  wait $EXEC_PID 2>/dev/null || true
                  echo "  IB tests finished."
                  echo ""

                  # Collect and display results
                  for i in "${!SOURCE_ACTIVE_DEVS[@]}"; do
                    if [ $i -ge ${#TARGET_ACTIVE_DEVS[@]} ]; then
                      break
                    fi
                    SOURCE_RDMA_DEV="${SOURCE_ACTIVE_DEVS[$i]}"
                    TARGET_RDMA_DEV="${TARGET_ACTIVE_DEVS[$i]}"
                    HOST_RESULT=$(oc exec $SOURCE_POD -- bash -c "cat /tmp/ib_host_${SOURCE_RDMA_DEV}_par_result.log 2>/dev/null | grep '$MSG_SIZE' | grep -v '#' | tail -1" || echo "")

                    if [ -n "$HOST_RESULT" ]; then
                      HOST_PAR_GBPS=$(echo "$HOST_RESULT" | awk '{print $4}')
                      HOST_PAR_ITERS=$(echo "$HOST_RESULT" | awk '{print $2}')
                      HOST_PAR_STATUS="PASS"
                      [ "$HOST_PAR_ITERS" -gt 1000 ] 2>/dev/null && HOST_PAR_STATUS="PASS" || HOST_PAR_STATUS="FAIL"
                      echo -e "  [$SOURCE_RDMA_DEV → $TARGET_RDMA_DEV] IB: ${GREEN}$HOST_PAR_GBPS Gb/s ($HOST_PAR_ITERS iters) - $HOST_PAR_STATUS${RESET}"

                      # Store in database
