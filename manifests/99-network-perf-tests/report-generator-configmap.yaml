                                <text x="225" y="{nccl_y_pos + 10}" text-anchor="middle" style="font-size:9px; fill:#2e7d32; font-weight:600;">NCCL: all_reduce {w1_all_reduce:.2f} | all_gather {w1_all_gather:.2f} GB/s</text>
                                <text x="225" y="{nccl_y_pos + 23}" text-anchor="middle" style="font-size:9px; fill:#2e7d32; font-weight:600;">broadcast {w1_broadcast:.2f} | reduce_scatter {w1_reduce_scatter:.2f} GB/s</text>
                            </g>
    
                            <!-- Worker 2 -->
                            <g>
                                <rect class="node-box" x="800" y="50" width="350" height="350" rx="10"/>
                                <text class="node-title" x="975" y="80" text-anchor="middle">{worker2}</text>
                                <text class="node-info" x="975" y="98" text-anchor="middle" style="font-size:10px;">CPU: Intel Xeon Gold 6330 (112 cores)</text>
                                <text class="node-info" x="975" y="113" text-anchor="middle" style="font-size:10px;">GPU: NVIDIA A30 | Driver: 580.82.07</text>
                                <text class="node-info" x="975" y="128" text-anchor="middle" style="font-size:10px;">eth0: {w2_eth0}</text>
                                <line x1="810" y1="145" x2="1140" y2="145" stroke="#ddd" stroke-width="1"/>
    {w2_nic_boxes}
                                <!-- NCCL Performance -->
                                <rect x="820" y="{nccl_y_pos}" width="310" height="30" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
                                <text x="975" y="{nccl_y_pos + 10}" text-anchor="middle" style="font-size:9px; fill:#2e7d32; font-weight:600;">NCCL: all_reduce {w2_all_reduce:.2f} | all_gather {w2_all_gather:.2f} GB/s</text>
                                <text x="975" y="{nccl_y_pos + 23}" text-anchor="middle" style="font-size:9px; fill:#2e7d32; font-weight:600;">broadcast {w2_broadcast:.2f} | reduce_scatter {w2_reduce_scatter:.2f} GB/s</text>
                            </g>
    
                            <!-- Connection lines -->
    {connection_lines}
                        </svg>
                    </div>
                    <p style="margin-top:15px; color:#666; font-size:0.9em">
                        <strong>Legend:</strong> Blue boxes = SR-IOV NICs | Green boxes = NCCL GPU Collective Operations | Arrows = Network connections |
                        Seq = Sequential (one NIC) | Par = Parallel (all NICs) | RoCE+CUDA = GPUDirect RDMA
                    </p>
                </div>"""
    
    
    def generate_worker_results(workers, nics, rdma_results, tcp_results, nccl_results, rdma_agg, tcp_agg, worker_nodes=None, worker_nic_speeds=None, gpu_topology=None, ucx_results=None, latency_results=None, ib_lat_sequential_results=None, ib_lat_parallel_results=None, latency_under_load_results=None):
        """Generate per-worker performance results"""
        import re

        # Default to empty list if not provided
        if gpu_topology is None:
            gpu_topology = []
        if ucx_results is None:
            ucx_results = []
        if latency_results is None:
            latency_results = []
        if ib_lat_sequential_results is None:
            ib_lat_sequential_results = []
        if ib_lat_parallel_results is None:
            ib_lat_parallel_results = []
        if latency_under_load_results is None:
            latency_under_load_results = []
    
        def format_nic_speed(speed_str):
            """Convert NIC speed string like '400000Mb/s' to '400Gb/s'"""
            if not speed_str or speed_str == 'Unknown':
                return 'Unknown'
            # Extract number from string like '400000Mb/s'
            import re
            match = re.search(r'(\d+)Mb/s', speed_str)
            if match:
                mbps = int(match.group(1))
                if mbps >= 1000:
                    gbps = mbps // 1000
                    return f'{gbps}G'
                else:
                    return f'{mbps}M'
            return speed_str
    
        def get_worker_nccl(worker):
            """Get NCCL results for a specific worker"""
            worker_nccl = [r for r in nccl_results if r['pod'] == worker]
            if not worker_nccl:
                return ""
    
            rows = ""
            for result in worker_nccl:
                rows += f"""
                                <tr>
                                    <td>{result['test']}</td>
                                    <td>{result['size']}</td>
                                    <td><span class="metric metric-high">{result['bandwidth']:.2f} GB/s</span></td>
                                    <td><span class="status-pass">✓ {result['status']}</span></td>
                                </tr>"""
    
            return f"""
                    <h3 style="margin-top: 25px; color: #dc3545;">🔄 NCCL Performance (Local GPU)</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Test</th>
                                <th>Peak Size</th>
                                <th>Peak Bandwidth</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
    {rows}
                        </tbody>
                    </table>"""
    
        def generate_worker_section(worker, other_workers, node_name=None):
            """Generate performance section for one worker"""
            # Build section header with node name if available
            if node_name:
                section_header = f"📊 {worker} (Node: {node_name})"
            else:
                section_header = f"📊 {worker}"
    
            all_tables = ""

            # Add GPU topology table for this worker
            if gpu_topology:
                all_tables += generate_gpu_topology_table(worker, gpu_topology)

            # Generate separate table for each target worker
            for target_worker in other_workers:
                # Get node names for direction text
                source_node = worker_nodes.get(worker, 'Unknown') if worker_nodes else 'Unknown'
                target_node = worker_nodes.get(target_worker, 'Unknown') if worker_nodes else 'Unknown'
                direction_text = f"{worker} (Node: {source_node}) → {target_worker} (Node: {target_node})"
                # RDMA Performance for this pair
                pair_rdma_agg = {'RoCE_seq': 0.0, 'RoCE_par': 0.0, 'RoCE_CUDA_seq': 0.0, 'RoCE_CUDA_par': 0.0}
                total_link_capacity_gbps = 0  # Track total capacity for aggregate thresholds
                rdma_rows = ""
                for nic in nics:
                    roce_seq = get_rdma_by_nic(rdma_results, nic, 'RoCE_seq', worker, target_worker)
                    roce_par = get_rdma_by_nic(rdma_results, nic, 'RoCE_par', worker, target_worker)
                    cuda_seq = get_rdma_by_nic(rdma_results, nic, 'RoCE_CUDA_seq', worker, target_worker)
                    cuda_par = get_rdma_by_nic(rdma_results, nic, 'RoCE_CUDA_par', worker, target_worker)
    
                    pair_rdma_agg['RoCE_seq'] += roce_seq
                    pair_rdma_agg['RoCE_par'] += roce_par
                    pair_rdma_agg['RoCE_CUDA_seq'] += cuda_seq
                    pair_rdma_agg['RoCE_CUDA_par'] += cuda_par
    
                    # Get NIC speed dynamically
                    nic_speed = 'Unknown'
                    nic_speed_gbps = 100  # Default for unknown speeds
                    if worker_nic_speeds and worker in worker_nic_speeds and nic in worker_nic_speeds[worker]:
                        nic_speed = format_nic_speed(worker_nic_speeds[worker][nic])
                        # Extract numeric speed in Gbps
                        speed_match = re.search(r'(\d+)G', nic_speed)
                        if speed_match:
                            nic_speed_gbps = int(speed_match.group(1))
    
                    # Track total capacity for aggregate threshold calculation
                    total_link_capacity_gbps += nic_speed_gbps
    
                    # Calculate thresholds as percentages of link speed
                    # Sequential tests should achieve very high utilization:
                    # Green (Excellent): >= 90%, Yellow (Good): 70-90%, Red (Needs Investigation): < 70%
                    high_thresh = nic_speed_gbps * 0.90
                    low_thresh = nic_speed_gbps * 0.70
    
                    if roce_seq > 0 or roce_par > 0:
                        rdma_rows += f"""
                                    <tr>
                                        <td><strong>{nic}</strong></td>
                                        <td>{nic_speed}</td>
                                        <td><span class="metric {get_metric_class(roce_seq, high_thresh, low_thresh)}">{roce_seq:.2f} Gb/s</span></td>
                                        <td><span class="metric {get_metric_class(roce_par, high_thresh, low_thresh)}">{roce_par:.2f} Gb/s</span></td>
                                        <td><span class="metric {get_metric_class(cuda_seq, high_thresh, low_thresh)}">{cuda_seq:.2f} Gb/s</span></td>
                                        <td><span class="metric {get_metric_class(cuda_par, high_thresh, low_thresh)}">{cuda_par:.2f} Gb/s</span></td>
                                    </tr>"""
    
                # Add aggregate row for this pair
                if rdma_rows:
                    # Calculate aggregate thresholds based on total link capacity
                    # Same thresholds as individual NICs: 90% excellent, 70% good
                    agg_high_thresh = total_link_capacity_gbps * 0.90
                    agg_low_thresh = total_link_capacity_gbps * 0.70
    
                    rdma_rows += f"""
                                    <tr style="background:#f0f0ff; font-weight:bold;">
                                        <td colspan="2" style="text-align:center;">Aggregate:</td>
                                        <td><span class="metric {get_metric_class(pair_rdma_agg['RoCE_seq'], agg_high_thresh, agg_low_thresh)}">{pair_rdma_agg['RoCE_seq']:.2f} Gb/s</span></td>
                                        <td><span class="metric {get_metric_class(pair_rdma_agg['RoCE_par'], agg_high_thresh, agg_low_thresh)}">{pair_rdma_agg['RoCE_par']:.2f} Gb/s</span></td>
                                        <td><span class="metric {get_metric_class(pair_rdma_agg['RoCE_CUDA_seq'], agg_high_thresh, agg_low_thresh)}">{pair_rdma_agg['RoCE_CUDA_seq']:.2f} Gb/s</span></td>
                                        <td><span class="metric {get_metric_class(pair_rdma_agg['RoCE_CUDA_par'], agg_high_thresh, agg_low_thresh)}">{pair_rdma_agg['RoCE_CUDA_par']:.2f} Gb/s</span></td>
                                    </tr>"""
    
                    # Build separate tables for HOST and CUDA
                    # HOST Memory Table
                    host_rows = ""
                    for nic in nics:
                        roce_seq = get_rdma_by_nic(rdma_results, nic, 'RoCE_seq', worker, target_worker)
                        roce_par = get_rdma_by_nic(rdma_results, nic, 'RoCE_par', worker, target_worker)

                        # Get NIC speed
                        nic_speed = 'Unknown'
                        nic_speed_gbps = 100
                        if worker_nic_speeds and worker in worker_nic_speeds and nic in worker_nic_speeds[worker]:
                            nic_speed = format_nic_speed(worker_nic_speeds[worker][nic])
                            speed_match = re.search(r'(\d+)G', nic_speed)
                            if speed_match:
                                nic_speed_gbps = int(speed_match.group(1))

                        high_thresh = nic_speed_gbps * 0.90
                        low_thresh = nic_speed_gbps * 0.70

                        if roce_seq > 0 or roce_par > 0:
                            # Format bandwidth values - show N/A if 0
                            seq_display = f'{roce_seq:.2f} Gb/s' if roce_seq > 0 else '<span style="color:#999;">N/A</span>'
                            par_display = f'{roce_par:.2f} Gb/s' if roce_par > 0 else '<span style="color:#999;">N/A</span>'
                            seq_class = get_metric_class(roce_seq, high_thresh, low_thresh) if roce_seq > 0 else ''
                            par_class = get_metric_class(roce_par, high_thresh, low_thresh) if roce_par > 0 else ''

                            host_rows += f"""
                                    <tr>
                                        <td><strong>{nic}</strong></td>
                                        <td>{nic_speed}</td>
                                        <td><span class="metric {seq_class}">{seq_display}</span></td>
                                        <td><span class="metric {par_class}">{par_display}</span></td>
                                    </tr>"""

                    if host_rows:
                        agg_high_thresh = total_link_capacity_gbps * 0.90
                        agg_low_thresh = total_link_capacity_gbps * 0.70
                        host_rows += f"""
                                    <tr style="background:#f0f0ff; font-weight:bold;">
                                        <td colspan="2" style="text-align:center;">Aggregate:</td>
                                        <td><span class="metric {get_metric_class(pair_rdma_agg['RoCE_seq'], agg_high_thresh, agg_low_thresh)}">{pair_rdma_agg['RoCE_seq']:.2f} Gb/s</span></td>
                                        <td><span class="metric {get_metric_class(pair_rdma_agg['RoCE_par'], agg_high_thresh, agg_low_thresh)}">{pair_rdma_agg['RoCE_par']:.2f} Gb/s</span></td>
                                    </tr>"""

                        host_table = f"""
                    <h3 style="margin-top: 25px; color: #dc3545;">⚡ RDMA Performance - HOST Memory</h3>
                    <p style="color: #333; font-size: 1.1em; font-weight: bold; margin-bottom: 10px;">Direction: {direction_text}</p>
                    <table>
                        <thead>
                            <tr>
                                <th>RDMA Device</th>
                                <th>Link Speed</th>
                                <th>Sequential</th>
                                <th>Parallel</th>
                            </tr>
                        </thead>
                        <tbody>
    {host_rows}
                        </tbody>
                    </table>
                    <p style="margin-top:10px; color:#666; font-size:0.85em">
                        <strong>Sequential:</strong> One device tested at a time | <strong>Parallel:</strong> All devices simultaneously
                    </p>"""
                        all_tables += host_table

                    # CUDA Memory Table
                    cuda_rows = ""
                    for nic in nics:
                        cuda_seq = get_rdma_by_nic(rdma_results, nic, 'RoCE_CUDA_seq', worker, target_worker)
                        cuda_par = get_rdma_by_nic(rdma_results, nic, 'RoCE_CUDA_par', worker, target_worker)

                        # Get NIC speed
                        nic_speed = 'Unknown'
                        nic_speed_gbps = 100
                        if worker_nic_speeds and worker in worker_nic_speeds and nic in worker_nic_speeds[worker]:
                            nic_speed = format_nic_speed(worker_nic_speeds[worker][nic])
                            speed_match = re.search(r'(\d+)G', nic_speed)
                            if speed_match:
                                nic_speed_gbps = int(speed_match.group(1))

                        high_thresh = nic_speed_gbps * 0.90
                        low_thresh = nic_speed_gbps * 0.70

                        if cuda_seq > 0 or cuda_par > 0:
                            # Format bandwidth values - show N/A if 0
                            seq_display = f'{cuda_seq:.2f} Gb/s' if cuda_seq > 0 else '<span style="color:#999;">N/A</span>'
                            par_display = f'{cuda_par:.2f} Gb/s' if cuda_par > 0 else '<span style="color:#999;">N/A</span>'
                            seq_class = get_metric_class(cuda_seq, high_thresh, low_thresh) if cuda_seq > 0 else ''
                            par_class = get_metric_class(cuda_par, high_thresh, low_thresh) if cuda_par > 0 else ''

                            cuda_rows += f"""
                                    <tr>
                                        <td><strong>{nic}</strong></td>
                                        <td>{nic_speed}</td>
                                        <td><span class="metric {seq_class}">{seq_display}</span></td>
                                        <td><span class="metric {par_class}">{par_display}</span></td>
                                    </tr>"""

                    if cuda_rows:
                        agg_high_thresh = total_link_capacity_gbps * 0.90
                        agg_low_thresh = total_link_capacity_gbps * 0.70
                        cuda_rows += f"""
                                    <tr style="background:#f0f0ff; font-weight:bold;">
                                        <td colspan="2" style="text-align:center;">Aggregate:</td>
                                        <td><span class="metric {get_metric_class(pair_rdma_agg['RoCE_CUDA_seq'], agg_high_thresh, agg_low_thresh)}">{pair_rdma_agg['RoCE_CUDA_seq']:.2f} Gb/s</span></td>
                                        <td><span class="metric {get_metric_class(pair_rdma_agg['RoCE_CUDA_par'], agg_high_thresh, agg_low_thresh)}">{pair_rdma_agg['RoCE_CUDA_par']:.2f} Gb/s</span></td>
                                    </tr>"""

                        cuda_table = f"""
                    <h3 style="margin-top: 25px; color: #dc3545;">🚀 RDMA Performance - CUDA Memory (GPUDirect)</h3>
                    <p style="color: #333; font-size: 1.1em; font-weight: bold; margin-bottom: 10px;">Direction: {direction_text}</p>
                    <table>
                        <thead>
                            <tr>
                                <th>RDMA Device</th>
                                <th>Link Speed</th>
                                <th>Sequential</th>
                                <th>Parallel</th>
                            </tr>
                        </thead>
                        <tbody>
    {cuda_rows}
                        </tbody>
                    </table>
                    <p style="margin-top:10px; color:#666; font-size:0.85em">
                        <strong>GPUDirect RDMA:</strong> Direct GPU memory access | <strong>Sequential:</strong> One device at a time | <strong>Parallel:</strong> All devices simultaneously
                    </p>"""
                        all_tables += cuda_table
    
                # TCP Performance for this pair
                pair_tcp_agg = {'tcp_seq': 0.0, 'tcp_par': 0.0}
                tcp_total_link_capacity_gbps = 0  # Track total capacity for TCP aggregate thresholds
                tcp_rows = ""
                for nic in nics:
                    tcp_result = get_tcp_by_nic(tcp_results, nic, worker, target_worker)
                    tcp_seq = tcp_result.get('tcp_seq', 0)
                    tcp_par = tcp_result.get('tcp_par', 0)
    
                    pair_tcp_agg['tcp_seq'] += tcp_seq
                    pair_tcp_agg['tcp_par'] += tcp_par
    
                    # Get NIC speed dynamically
                    nic_speed = 'Unknown'
                    nic_speed_gbps = 100  # Default for unknown speeds
                    if worker_nic_speeds and worker in worker_nic_speeds and nic in worker_nic_speeds[worker]:
                        nic_speed = format_nic_speed(worker_nic_speeds[worker][nic])
                        # Extract numeric speed in Gbps
                        speed_match = re.search(r'(\d+)G', nic_speed)
                        if speed_match:
                            nic_speed_gbps = int(speed_match.group(1))
    
                    # Track total capacity for TCP aggregate threshold calculation
                    tcp_total_link_capacity_gbps += nic_speed_gbps
    
                    # Calculate thresholds as percentages of link speed
                    # TCP has kernel overhead, lower thresholds:
                    # Green (Excellent): >= 10%, Yellow (Good): 5-10%, Red (Needs Investigation): < 5%
                    high_thresh = nic_speed_gbps * 0.10
                    low_thresh = nic_speed_gbps * 0.05
    
                    if tcp_seq > 0 or tcp_par > 0:
                        tcp_rows += f"""
                                    <tr>
                                        <td><strong>{nic}</strong></td>
                                        <td>{nic_speed}</td>
                                        <td><span class="metric {get_metric_class(tcp_seq, high_thresh, low_thresh)}">{tcp_seq:.2f} Gb/s</span></td>
                                        <td><span class="metric {get_metric_class(tcp_par, high_thresh, low_thresh)}">{tcp_par:.2f} Gb/s</span></td>
                                    </tr>"""
    
                # Add aggregate row for this pair
                if tcp_rows:
                    # Calculate TCP aggregate thresholds based on total link capacity
                    # Same thresholds as individual NICs: 10% excellent, 5% good
                    tcp_agg_high_thresh = tcp_total_link_capacity_gbps * 0.10
                    tcp_agg_low_thresh = tcp_total_link_capacity_gbps * 0.05
    
                    tcp_rows += f"""
                                    <tr style="background:#f0f0ff; font-weight:bold;">
                                        <td colspan="2" style="text-align:center;">Aggregate:</td>
                                        <td><span class="metric {get_metric_class(pair_tcp_agg['tcp_seq'], tcp_agg_high_thresh, tcp_agg_low_thresh)}">{pair_tcp_agg['tcp_seq']:.2f} Gb/s</span></td>
                                        <td><span class="metric {get_metric_class(pair_tcp_agg['tcp_par'], tcp_agg_high_thresh, tcp_agg_low_thresh)}">{pair_tcp_agg['tcp_par']:.2f} Gb/s</span></td>
                                    </tr>"""
    
                    tcp_table = f"""
                    <h3 style="margin-top: 25px; color: #dc3545;">🌐 TCP Performance - Sequential & Parallel Tests</h3>
                    <p style="color: #333; font-size: 1.1em; font-weight: bold; margin-bottom: 10px;">Direction: {direction_text}</p>
                    <table>
                        <thead>
                            <tr>
                                <th>NIC</th>
                                <th>Link</th>
                                <th>TCP Sequential</th>
                                <th>TCP Parallel</th>
                            </tr>
                        </thead>
                        <tbody>
    {tcp_rows}
                        </tbody>
                    </table>
                    <p style="margin-top:10px; color:#666; font-size:0.85em">
                        <strong>Sequential:</strong> One NIC tested at a time | <strong>Parallel:</strong> All NICs tested simultaneously
                    </p>"""
                    all_tables += tcp_table

                # UCX Performance for this pair
                if ucx_results:
                    ucx_host_rows = ""
                    ucx_cuda_rows = ""
                    # Track aggregates for UCX
                    total_ucx_host_seq = 0
                    total_ucx_host_par = 0
                    total_ucx_cuda_seq = 0
                    total_ucx_cuda_par = 0

                    for nic in nics:
                        # Get UCX results for this NIC (separate sequential and parallel)
                        ucx_host_bw_seq = 0
                        ucx_host_bw_par = 0
                        ucx_host_lat = 0
                        ucx_cuda_bw_seq = 0
                        ucx_cuda_bw_par = 0
                        ucx_cuda_lat = 0

                        for result in ucx_results:
                            if result['source'] == worker and result['target'] == target_worker and result['nic'] == nic:
                                if result['memory_type'] == 'host':
                                    if 'sequential' in result.get('test_mode', ''):
                                        if result['bandwidth_gbps'] > 0:
                                            ucx_host_bw_seq = result['bandwidth_gbps']
                                    elif 'parallel' in result.get('test_mode', ''):
                                        if result['bandwidth_gbps'] > 0:
                                            ucx_host_bw_par = result['bandwidth_gbps']
                                    elif 'lat' in result.get('test_mode', ''):
                                        if result['latency_usec'] > 0:
                                            ucx_host_lat = result['latency_usec']
                                elif result['memory_type'] == 'cuda':
                                    if 'sequential' in result.get('test_mode', ''):
                                        if result['bandwidth_gbps'] > 0:
                                            ucx_cuda_bw_seq = result['bandwidth_gbps']
                                    elif 'parallel' in result.get('test_mode', ''):
                                        if result['bandwidth_gbps'] > 0:
                                            ucx_cuda_bw_par = result['bandwidth_gbps']
                                    elif 'lat' in result.get('test_mode', ''):
                                        if result['latency_usec'] > 0:
                                            ucx_cuda_lat = result['latency_usec']

                        # Accumulate aggregates
                        total_ucx_host_seq += ucx_host_bw_seq
                        total_ucx_host_par += ucx_host_bw_par
                        total_ucx_cuda_seq += ucx_cuda_bw_seq
                        total_ucx_cuda_par += ucx_cuda_bw_par

                        # Get NIC speed
                        nic_speed = 'Unknown'
                        if worker_nic_speeds and worker in worker_nic_speeds and nic in worker_nic_speeds[worker]:
                            nic_speed = format_nic_speed(worker_nic_speeds[worker][nic])

                        if ucx_host_bw_seq > 0 or ucx_host_bw_par > 0 or ucx_host_lat > 0:
                            # Format bandwidth values with color coding
                            high_thresh = 340  # Gb/s
                            low_thresh = 250   # Gb/s

                            if ucx_host_bw_seq > 0:
                                seq_class = get_metric_class(ucx_host_bw_seq, high_thresh, low_thresh)
                                seq_display = f'<span class="metric {seq_class}">{ucx_host_bw_seq:.2f} Gb/s</span>'
                            else:
                                seq_display = '<span style="color:#999;">N/A</span>'

                            if ucx_host_bw_par > 0:
                                par_class = get_metric_class(ucx_host_bw_par, high_thresh, low_thresh)
                                par_display = f'<span class="metric {par_class}">{ucx_host_bw_par:.2f} Gb/s</span>'
                            else:
                                par_display = '<span style="color:#999;">N/A</span>'

                            if ucx_host_lat > 0:
                                lat_class = get_latency_class(ucx_host_lat, 'sequential')
                                lat_display = f'<span class="metric {lat_class}">{ucx_host_lat:.2f} μs</span>'
                            else:
                                lat_display = '<span style="color:#999;">N/A</span>'

                            ucx_host_rows += f"""
                                <tr>
                                    <td><strong>{nic}</strong></td>
                                    <td>{nic_speed}</td>
                                    <td>{seq_display}</td>
                                    <td>{par_display}</td>
                                    <td>{lat_display}</td>
                                </tr>"""

