                            <tr style="background:#f0f0ff; font-weight:bold;">
                                <td colspan="4" style="text-align:center;">Aggregate Bandwidth:</td>
                                <td><span class="metric metric-high">{rdma_agg['RoCE_seq']:.2f} Gb/s</span></td>
