    #!/usr/bin/env python3
    """
    Database-driven Report Generator
    Reads from SQLite database instead of parsing logs
    """
    import sys
    import os
    import sqlite3

    # Import the original HTML generators (they expect the same data structure)
    import html_generator
    import circular_topology

    DB_FILE = os.environ.get('DB_FILE', '/tmp/network-perf-results.db')

    def collect_data_from_database():
        """Read test data from SQLite database and format for report generators"""
        
        try:
            conn = sqlite3.connect(DB_FILE)
            conn.row_factory = sqlite3.Row
            c = conn.cursor()
        except Exception as e:
            print(f"ERROR: Could not connect to database: {e}")
            return None
        
        data = {
            'workers': [],
            'nics': [],
            'rdma_results': [],
            'tcp_results': [],
            'nccl_results': [],
            'multinode_nccl_results': [],
            'worker_ips': {},
            'worker_nodes': {},
            'worker_routes': {},
            'worker_nic_models': {},
            'worker_nic_speeds': {},
            'hardware': {
                'gpu_model': 'NVIDIA H200',
                'cpu_model': 'Intel Xeon',
                'cpu_cores': '64',
                'memory_gb': '512'
            }
        }
        
        # Get latest test run
        c.execute("SELECT * FROM test_runs ORDER BY start_time DESC LIMIT 1")
        test_run = c.fetchone()
        if not test_run:
            print("ERROR: No test runs found in database")
            return None
        
        test_run_id = test_run['test_run_id']
        
        # Get unique workers from all test tables
        c.execute("""
            SELECT DISTINCT source_pod FROM ib_results WHERE test_run_id = ?
            UNION
            SELECT DISTINCT target_pod FROM ib_results WHERE test_run_id = ?
            UNION
            SELECT DISTINCT pod_name FROM nccl_results WHERE test_run_id = ?
            UNION
            SELECT DISTINCT source_pod FROM ucx_results WHERE test_run_id = ?
            UNION
            SELECT DISTINCT target_pod FROM ucx_results WHERE test_run_id = ?
            UNION
            SELECT DISTINCT source_pod FROM latency_results WHERE test_run_id = ?
            UNION
            SELECT DISTINCT target_pod FROM latency_results WHERE test_run_id = ?
        """, (test_run_id, test_run_id, test_run_id, test_run_id, test_run_id, test_run_id, test_run_id))
        workers = [row[0] for row in c.fetchall()]
        data['workers'] = sorted(workers)
        
        # Get unique RDMA devices (treat as NICs)
        c.execute("""
            SELECT DISTINCT rdma_device_source FROM ib_results WHERE test_run_id = ?
        """, (test_run_id,))
        nics = [row[0] for row in c.fetchall()]
        data['nics'] = sorted(nics)
        
        # Convert IB results to RDMA results format
        # Original expects: {source, target, nic, type, bandwidth}
        # Types: RoCE_seq, RoCE_par, RoCE_CUDA_seq, RoCE_CUDA_par
        c.execute("""
            SELECT source_pod, target_pod, rdma_device_source, test_mode, memory_type, bandwidth_gbps
            FROM ib_results
            WHERE test_run_id = ?
        """, (test_run_id,))
        
        for row in c.fetchall():
            # Map our format to original format
            if row['memory_type'] == 'host':
                if row['test_mode'] == 'sequential':
                    test_type = 'RoCE_seq'
                else:  # parallel
                    test_type = 'RoCE_par'
            else:  # cuda
                if row['test_mode'] == 'sequential':
                    test_type = 'RoCE_CUDA_seq'
                else:  # parallel
                    test_type = 'RoCE_CUDA_par'
            
            data['rdma_results'].append({
                'source': row['source_pod'],
                'target': row['target_pod'],
                'nic': row['rdma_device_source'],
                'type': test_type,
                'bandwidth': row['bandwidth_gbps']
            })
        
        # Get NCCL results
        # Original expects: {pod, test, bandwidth, status}
        c.execute("""
            SELECT pod_name, test_name, peak_bandwidth_gbps, test_status
            FROM nccl_results
            WHERE test_run_id = ?
        """, (test_run_id,))

        for row in c.fetchall():
            # Map test_name to expected test names
            test_map = {
                'all_reduce': 'all_reduce',
                'all_gather': 'all_gather',
                'broadcast': 'broadcast',
                'reduce_scatter': 'reduce_scatter',
                'reduce_sca': 'reduce_scatter'  # Handle truncated name
            }
            test_name = test_map.get(row['test_name'], row['test_name'])
            
            data['nccl_results'].append({
                'pod': row['pod_name'],
                'test': test_name,
                'bandwidth': row['peak_bandwidth_gbps'],
                'status': row['test_status'],
                'gpu': 'NVIDIA H200',
                'size': '128MB'
            })

        # Get UCX results
        data['ucx_results'] = []
        try:
            c.execute("""
                SELECT source_pod, target_pod, rdma_device_source, test_mode, memory_type,
                       bandwidth_gbps, latency_usec
                FROM ucx_results
                WHERE test_run_id = ?
            """, (test_run_id,))

            for row in c.fetchall():
                data['ucx_results'].append({
                    'source': row['source_pod'],
                    'target': row['target_pod'],
                    'nic': row['rdma_device_source'],
                    'test_mode': row['test_mode'],
                    'memory_type': row['memory_type'],
                    'bandwidth_gbps': row['bandwidth_gbps'] if row['bandwidth_gbps'] else 0,
                    'latency_usec': row['latency_usec'] if row['latency_usec'] else 0
                })
        except:
            pass

        # Get IB parallel latency results
        data['ib_lat_parallel_results'] = []
        try:
            c.execute("""
                SELECT source_pod, target_pod, rdma_device_source, memory_type, latency_usec
                FROM ib_results
                WHERE test_run_id = ? AND test_mode = 'latency_parallel'
            """, (test_run_id,))

            for row in c.fetchall():
                data['ib_lat_parallel_results'].append({
                    'source': row['source_pod'],
                    'target': row['target_pod'],
                    'nic': row['rdma_device_source'],
                    'memory_type': row['memory_type'],
                    'latency_usec': row['latency_usec'] if row['latency_usec'] else 0
                })
        except:
            pass

        # Get IB sequential latency results
        data['ib_lat_sequential_results'] = []
        try:
            c.execute("""
                SELECT source_pod, target_pod, rdma_device_source, memory_type, latency_usec
                FROM ib_results
                WHERE test_run_id = ? AND test_mode = 'latency_sequential'
            """, (test_run_id,))

            for row in c.fetchall():
                data['ib_lat_sequential_results'].append({
                    'source': row['source_pod'],
                    'target': row['target_pod'],
                    'nic': row['rdma_device_source'],
                    'memory_type': row['memory_type'],
                    'latency_usec': row['latency_usec'] if row['latency_usec'] else 0
                })
        except:
            pass

        # Get latency results
        data['latency_results'] = []
        try:
            c.execute("""
                SELECT source_pod, target_pod, rdma_device_source, memory_type, latency_average_us
                FROM latency_results
                WHERE test_run_id = ?
            """, (test_run_id,))

            for row in c.fetchall():
                data['latency_results'].append({
                    'source': row['source_pod'],
                    'target': row['target_pod'],
                    'nic': row['rdma_device_source'],
                    'memory_type': row['memory_type'],
                    'latency_usec': row['latency_average_us']
                })
        except:
            pass

        # Get TCP results
        try:
            c.execute("""
                SELECT source_pod, target_pod, nic_interface, test_mode, bandwidth_gbps
                FROM tcp_results
                WHERE test_run_id = ?
            """, (test_run_id,))

            for row in c.fetchall():
                nic = row['nic_interface']
                # Update existing entry or create new one
                existing = None
                for result in data['tcp_results']:
                    if result['source'] == row['source_pod'] and result['target'] == row['target_pod'] and result['nic'] == nic:
                        existing = result
                        break

                if existing:
                    if row['test_mode'] == 'sequential':
                        existing['tcp_seq'] = row['bandwidth_gbps']
                    elif row['test_mode'] == 'parallel':
                        existing['tcp_par'] = row['bandwidth_gbps']
                else:
                    new_result = {
                        'source': row['source_pod'],
                        'target': row['target_pod'],
                        'nic': nic,
                        'tcp_seq': 0.0,
                        'tcp_par': 0.0
                    }
                    if row['test_mode'] == 'sequential':
                        new_result['tcp_seq'] = row['bandwidth_gbps']
                    elif row['test_mode'] == 'parallel':
                        new_result['tcp_par'] = row['bandwidth_gbps']
                    data['tcp_results'].append(new_result)
        except Exception as e:
            print(f"Warning: Could not load TCP results: {e}")
            pass

        # Get GPU-NIC topology (only optimal PXB mappings for tested NICs)
        try:
            c.execute("""
                SELECT DISTINCT g.pod_name, g.nic_device, g.gpu_id, g.connection_type
                FROM gpu_nic_topology g
                WHERE g.test_run_id = ?
                  AND g.connection_type = 'PXB'
                  AND g.nic_device IN (
                    SELECT DISTINCT rdma_device_source FROM ib_results WHERE test_run_id = ?
                  )
                ORDER BY g.pod_name, g.nic_device
            """, (test_run_id, test_run_id))

            data['gpu_topology'] = []
            for row in c.fetchall():
                data['gpu_topology'].append({
                    'pod': row['pod_name'],
                    'nic': row['nic_device'],
                    'gpu': row['gpu_id'],
                    'connection': row['connection_type']
                })
        except:
            data['gpu_topology'] = []

        # Build worker metadata from database
        for worker in data['workers']:
            # Extract node name from worker pod name
            # Format: network-perf-test-worker-xxxxx
            data['worker_nodes'][worker] = worker.replace('network-perf-test-worker-', '')

            # Get IPs and speeds for each NIC/device
            worker_ips = {}
            worker_speeds = {}

            for nic in data['nics']:
                # Use device name as placeholder IP
                worker_ips[nic] = f"10.1.{data['nics'].index(nic)}.{data['workers'].index(worker)+1}"
                worker_speeds[nic] = "400000Mb/s"  # 400G

            data['worker_ips'][worker] = worker_ips
            data['worker_nic_speeds'][worker] = worker_speeds
            data['worker_routes'][worker] = {}
            data['worker_nic_models'][worker] = {nic: 'Mellanox ConnectX-7' for nic in data['nics']}

        # Detect disconnected links (NICs with no test results)
        data['disconnected_links'] = {}
        for worker in data['workers']:
            disconnected = []
            for nic in data['nics']:
                # Check if this NIC has any test results
                has_results = any(
                    r['source'] == worker and r['nic'] == nic
                    for r in data['rdma_results']
                )
                if not has_results:
                    disconnected.append(nic)
            if disconnected:
                data['disconnected_links'][worker] = disconnected

        # Get latency-under-load results
        data['latency_under_load_results'] = []
        try:
            c.execute("""
                SELECT source_pod, target_pod, source_node, target_node,
                       rdma_device_source, rdma_device_target, message_size,
                       test_type, memory_type, latency_usec, test_status
                FROM latency_under_load_results
                WHERE test_run_id = ?
            """, (test_run_id,))

            for row in c.fetchall():
                data['latency_under_load_results'].append({
                    'source': row['source_pod'],
                    'target': row['target_pod'],
                    'source_node': row['source_node'],
                    'target_node': row['target_node'],
                    'nic_source': row['rdma_device_source'],
                    'nic_target': row['rdma_device_target'],
                    'message_size': row['message_size'],
                    'test_type': row['test_type'],
                    'memory_type': row['memory_type'],
                    'latency_usec': row['latency_usec'] if row['latency_usec'] else 0,
                    'status': row['test_status']
                })
        except Exception as e:
            print(f"Warning: Could not load latency_under_load_results: {e}")
            pass

        conn.close()
        return data


