    def generate_stats_overview(num_workers, num_nics, hw, worker_nic_speeds=None):
        """Generate test overview stats"""
        gpu_model = hw.get('gpu_model', 'Unknown GPU')
    
        # Calculate unique link speeds from all NICs
        link_speeds = set()
        if worker_nic_speeds:
            for worker in worker_nic_speeds:
                for nic, speed_str in worker_nic_speeds[worker].items():
                    if speed_str and speed_str != 'Unknown':
                        # Convert to Gbps format
                        import re
                        match = re.search(r'(\d+)Mb/s', speed_str)
                        if match:
                            mbps = int(match.group(1))
                            if mbps >= 1000:
                                gbps = mbps // 1000
                                link_speeds.add(gbps)
    
        # Format link speeds for display
        if link_speeds:
            sorted_speeds = sorted(link_speeds)
            if len(sorted_speeds) == 1:
                link_speed_display = f"{sorted_speeds[0]}G"
            else:
                link_speed_display = f"{sorted_speeds[0]}G - {sorted_speeds[-1]}G"
        else:
            link_speed_display = "100G"
    
        return f"""<div class="section">
                    <h2>📊 Test Overview</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Worker Nodes</div>
                            <div class="stat-value">{num_workers}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">RDMA Devices</div>
                            <div class="stat-value">{num_nics}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">GPU Type</div>
                            <div class="stat-value" style="font-size:1.5em">{gpu_model}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Link Speed</div>
                            <div class="stat-value">{link_speed_display}</div>
                        </div>
                    </div>
                </div>"""
    
    
