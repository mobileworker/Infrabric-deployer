            excellent_max = 120
            acceptable_max = 200
        else:  # under_load
            # Under bandwidth load: excellent < 120μs, acceptable < 300μs
            excellent_max = 120
            acceptable_max = 300

        # Lower latency = better (green), higher latency = worse (red)
        if latency_usec <= excellent_max:
            return 'metric-high'  # Green - excellent
