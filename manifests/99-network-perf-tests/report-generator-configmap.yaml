        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🖥️ Network Topology - Server View</h1>
            </div>
    
            <div class="controls">
                <button class="btn" onclick="resetView()">🔄 Reset View</button>
                <button class="btn" onclick="cy.zoom(cy.zoom() * 1.2); cy.center()">🔍+ Zoom In</button>
                <button class="btn" onclick="cy.zoom(cy.zoom() * 0.8); cy.center()">🔍- Zoom Out</button>
                <button class="btn" onclick="fitToScreen()">📐 Fit to Screen</button>
                <button class="btn" onclick="exportPNG()">📸 Export PNG</button>
                <button class="btn" onclick="exportJSON()">💾 Export JSON</button>
                <button class="btn" onclick="exportHTML()">📄 Export HTML</button>
            </div>
    
            <div class="info-text">
                <strong>💡 Controls:</strong>
                Scroll to zoom | Drag background to pan | <strong>Drag server icons to move</strong> |
                Click server for details | <strong>Double-click canvas to reset zoom</strong> | <strong>Drag to box-select and zoom</strong>
            </div>
    
            <div style="position: relative;">
                <div id="cy"></div>
                <div id="info-panel" class="info-panel">
                    <button class="close-btn" onclick="closeInfo()">✕</button>
