    def get_latency_class(latency_usec, test_type='sequential'):
        """Return CSS class for latency values (lower is better)

        Args:
            latency_usec: Latency in microseconds
            test_type: 'sequential', 'parallel', or 'under_load'

        Returns:
            CSS class name: 'metric-high' (green/excellent), 'metric-medium' (yellow/acceptable), 'metric-low' (red/poor)
        """
