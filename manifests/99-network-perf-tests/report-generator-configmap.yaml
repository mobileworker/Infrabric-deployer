    def generate_warnings_section(data, log_file='/tmp/test-output.log'):
        """Generate warnings section with disconnected links per node"""
        warnings = []
        disconnected_links = data.get('disconnected_links', {})
        worker_nodes = data.get('worker_nodes', {})

        # Show disconnected links organized by node
        if disconnected_links:
            warnings.append("<strong>⚠️ Disconnected Links by Node:</strong>")
            for worker in sorted(disconnected_links.keys()):
                node_name = worker_nodes.get(worker, worker.replace('network-perf-test-worker-', ''))
                nics = disconnected_links[worker]

                # Separate by RoCE/IB type (mlx5_* devices are typically RoCE in our setup)
                # This can be enhanced later to detect actual link type from database
                roce_links = [nic for nic in nics if nic.startswith('mlx5_')]
                other_links = [nic for nic in nics if not nic.startswith('mlx5_')]

                if roce_links:
                    warnings.append(f"<strong>Node {node_name} (RoCE/RDMA):</strong>")
                    for nic in sorted(roce_links):
                        warnings.append(f"  • {nic} - No test results (link may be down or not configured)")

                if other_links:
                    warnings.append(f"<strong>Node {node_name} (Other):</strong>")
                    for nic in sorted(other_links):
                        warnings.append(f"  • {nic} - No test results (link may be down or not configured)")

        # Check for IOMMU warnings in logs (optional, keep for backward compatibility)
        try:
            with open(log_file, 'r') as f:
                logs = f.read()

            import re
            iommu_nodes = set()
            for line in logs.split('\n'):
                iommu_match = re.search(r'IOMMU is ENABLED on node:\s+(\S+)', line, re.IGNORECASE)
                if iommu_match:
                    node = iommu_match.group(1)
                    iommu_nodes.add(node)

            if iommu_nodes:
                warnings.append("<strong>⚠️ IOMMU Configuration Issues:</strong>")
                for node in sorted(iommu_nodes):
                    warnings.append(f"  • Node {node}: IOMMU is enabled")
                warnings.append("  <em>Note: IOMMU must be disabled for GPUDirect RDMA</em>")
        except Exception as e:
            pass  # Ignore if log file doesn't exist

        # Generate HTML
        if not warnings:
            return """<div class="section">
                        <h2>✅ System Status</h2>
                        <div id="warnings-box" class="warning-box success">
                            <div id="warnings-content">
                                <div class="warning-item">All RDMA devices operational</div>
                            </div>
                        </div>
                    </div>"""
        else:
            warnings_html = ''.join([f'<div class="warning-item" style="margin:5px 0;">{w}</div>' for w in warnings])
            return f"""<div class="section">
                        <h2>⚠️ System Status</h2>
                        <div id="warnings-box" class="warning-box">
                            <div id="warnings-content">{warnings_html}</div>
                        </div>
                    </div>"""
    

    def generate_gpu_topology_table(worker, gpu_topology_data):
        """Generate GPU-NIC topology table for a specific worker"""
        # Filter topology data for this worker
        worker_topology = [t for t in gpu_topology_data if t['pod'] == worker]

        if not worker_topology:
            return ""

        # Sort by NIC name for consistent display
        worker_topology_sorted = sorted(worker_topology, key=lambda x: x['nic'])

        rows = ""
        for topo in worker_topology_sorted:
            nic = topo['nic']
            gpu_id = topo['gpu']
            connection = topo['connection']

            rows += f"""
                                <tr>
                                    <td><strong>{nic}</strong></td>
                                    <td>GPU{gpu_id}</td>
                                    <td>{connection}</td>
                                </tr>"""

        return f"""
                <h3 style="margin-top: 25px; color: #dc3545;">🔗 GPU-NIC Topology</h3>
                <table>
                    <thead>
                        <tr>
                            <th>RDMA Device</th>
                            <th>Optimal GPU</th>
                            <th>Connection Type</th>
                        </tr>
                    </thead>
                    <tbody>
    {rows}
                    </tbody>
                </table>
                <p style="margin-top:10px; color:#666; font-size:0.85em">
                    <strong>PXB:</strong> PCIe switch connection (optimal for GPUDirect RDMA) |
                    <strong>NODE:</strong> Same NUMA node/CPU socket |
                    <strong>SYS:</strong> Cross-socket connection |
                    <strong>NV#:</strong> Direct NVLink connection (# = number of links)
                </p>"""


