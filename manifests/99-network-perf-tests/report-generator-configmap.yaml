            for line in logs.split('\n'):
                iommu_match = re.search(r'IOMMU is ENABLED on node:\s+(\S+)', line, re.IGNORECASE)
                if iommu_match:
                    iommu_nodes.add(iommu_match.group(1))

            if iommu_nodes:
                warnings_list.append("<strong>⚠️ IOMMU Configuration Issues:</strong>")
                for node in sorted(iommu_nodes):
                    warnings_list.append(f"  • Node {node}: IOMMU is enabled")
                warnings_list.append("  <em>Note: IOMMU must be disabled for GPUDirect RDMA</em>")
        except Exception as e:
            pass  # Ignore if log file doesn't exist
    
        # Generate JavaScript
        warnings_js = ""
        if not warnings_list:
            warnings_js = """
            const warningsBox = document.getElementById('warnings-box');
            const warningsContent = document.getElementById('warnings-content');
            warningsBox.classList.add('success');
            warningsBox.querySelector('h3').textContent = '✅ System Status';
            warningsContent.innerHTML = '<div class="warning-item">All RDMA devices operational</div>';
            """
        else:
            # Build the HTML string from warnings list
            warnings_items = ''.join([f'<div class="warning-item">{w}</div>' for w in warnings_list])
            warnings_html_escaped = warnings_items.replace("'", "\\'")
            warnings_js = f"""
            const warningsContent = document.getElementById('warnings-content');
            warningsContent.innerHTML = '{warnings_html_escaped}';
            """
    
        html = f"""<!DOCTYPE html>
    <html>
