---
# MachineConfig to normalize InfiniBand interface names across all nodes
# This ensures consistent naming for IPoIB CNI with RDMA shared devices
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker
  name: 99-worker-normalize-ib-interface-names
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - contents:
          # Udev rules to rename IB interfaces based on PCI address
          # This normalizes interface names across nodes for consistent IPoIB CNI configuration
          source: data:text/plain;charset=utf-8;base64,
        mode: 0644
        overwrite: true
        path: /etc/udev/rules.d/99-normalize-ib-interfaces.rules
