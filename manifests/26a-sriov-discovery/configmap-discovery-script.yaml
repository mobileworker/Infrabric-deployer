apiVersion: v1
kind: ConfigMap
metadata:
  name: nic-port-discovery-script
  namespace: default
data:
  discover-nic-ports.sh: |
    #!/bin/bash
    set -euo pipefail

    echo "=== NIC Discovery Script (InfiniBand & RoCE) ==="
    echo "Discovering Mellanox/NVIDIA network adapters..."

    # Wait for SR-IOV configuration to stabilize (if VFs are being created)
    # This allows physical function links to come back up after VF creation
    echo "Waiting 30 seconds for SR-IOV links to stabilize..."
    sleep 30

    # Output file for discovered ports
    OUTPUT_FILE="/discovery/ports.json"

    # Initialize JSON array
    echo "[" > "$OUTPUT_FILE"

    FIRST_ENTRY=true

    # Find all Mellanox/NVIDIA NICs (vendor ID: 15b3)
    # Include both Ethernet and InfiniBand controllers
    for pci_addr in $(lspci -D -d 15b3: | grep -i 'network\|ethernet\|infiniband' | awk '{print $1}'); do
      echo "Found device at PCI address: $pci_addr"

      # Get device ID
      device_id=$(lspci -n -s "$pci_addr" | awk '{print $3}' | cut -d':' -f2)

      # Get device name
      device_name=$(lspci -s "$pci_addr" | cut -d':' -f3- | xargs)

      # Find the network interface name for this PCI address
      # This works for both physical functions and virtual functions
      net_path="/sys/bus/pci/devices/$pci_addr/net"

      if [ -d "$net_path" ]; then
        for iface in "$net_path"/*; do
          if [ -d "$iface" ]; then
            ifname=$(basename "$iface")
            echo "  Network Interface: $ifname"

            # Check SR-IOV capability (may not exist for pure IB devices)
            sriov_capable=false
            sriov_totalvfs=0
            if [ -f "/sys/class/net/$ifname/device/sriov_numvfs" ]; then
              sriov_capable=true
              sriov_totalvfs=$(cat "/sys/class/net/$ifname/device/sriov_totalvfs" 2>/dev/null || echo "0")
              echo "  SR-IOV capable: $sriov_totalvfs VFs"
            else
              echo "  Native InfiniBand device (no SR-IOV)"
            fi

            # Check if RDMA device exists and detect link type
            rdma_device=""
            link_type=""  # Will be auto-detected
            link_type_detected=false

            if [ -d "/sys/class/net/$ifname/device/infiniband" ]; then
              rdma_device=$(ls "/sys/class/net/$ifname/device/infiniband" | head -1)
              echo "  RDMA device: $rdma_device"

              # Detect link layer type (InfiniBand vs Ethernet/RoCE)
              # Method 1: Check via infiniband device ports
              for port_dir in "/sys/class/infiniband/$rdma_device/ports"/*; do
                if [ -d "$port_dir" ] && [ -f "$port_dir/link_layer" ]; then
                  port_num=$(basename "$port_dir")
                  detected_link_layer=$(cat "$port_dir/link_layer" 2>/dev/null || echo "")
                  echo "  Port $port_num link layer: $detected_link_layer"

                  # Map link layer to SR-IOV linkType
                  if [ "$detected_link_layer" = "InfiniBand" ]; then
                    link_type="ib"
                    link_type_detected=true
                    echo "  Detected InfiniBand native fabric"
                  elif [ "$detected_link_layer" = "Ethernet" ]; then
                    link_type="eth"
                    link_type_detected=true
                    echo "  Detected RoCE (RDMA over Converged Ethernet)"
                  fi
                  break  # Use first port's link layer
                fi
              done
            fi

            # Method 2: Fallback - check for InfiniBand-style naming or device attributes
            if [ "$link_type_detected" = false ]; then
              # Check interface name for InfiniBand pattern (ib*, mlx*)
              if [[ "$ifname" =~ ^ib ]]; then
                link_type="ib"
                echo "  Detected InfiniBand from interface naming: $ifname"
              else
                # Default to Ethernet/RoCE for standard naming
                link_type="eth"
                echo "  Defaulting to RoCE/Ethernet for interface: $ifname"
              fi
            fi

            # Get link status
            link_status=$(cat "/sys/class/net/$ifname/operstate" 2>/dev/null || echo "unknown")

            # Get carrier status (actual physical link up)
            carrier=$(cat "/sys/class/net/$ifname/carrier" 2>/dev/null || echo "0")

            # Get MAC address
            mac_addr=$(cat "/sys/class/net/$ifname/address" 2>/dev/null || echo "unknown")

            # Add comma if not first entry
            if [ "$FIRST_ENTRY" = false ]; then
              echo "," >> "$OUTPUT_FILE"
            fi
            FIRST_ENTRY=false

            # Write JSON entry using printf to avoid YAML parsing issues
            printf '  {\n' >> "$OUTPUT_FILE"
            printf '    "pciAddress": "%s",\n' "$pci_addr" >> "$OUTPUT_FILE"
            printf '    "deviceID": "%s",\n' "$device_id" >> "$OUTPUT_FILE"
            printf '    "deviceName": "%s",\n' "$device_name" >> "$OUTPUT_FILE"
            printf '    "pfName": "%s",\n' "$ifname" >> "$OUTPUT_FILE"
            printf '    "sriovCapable": %s,\n' "$sriov_capable" >> "$OUTPUT_FILE"
            printf '    "sriovTotalVfs": %s,\n' "$sriov_totalvfs" >> "$OUTPUT_FILE"
            printf '    "rdmaDevice": "%s",\n' "$rdma_device" >> "$OUTPUT_FILE"
            printf '    "linkType": "%s",\n' "$link_type" >> "$OUTPUT_FILE"
            printf '    "linkStatus": "%s",\n' "$link_status" >> "$OUTPUT_FILE"
            printf '    "carrier": "%s",\n' "$carrier" >> "$OUTPUT_FILE"
            printf '    "macAddress": "%s",\n' "$mac_addr" >> "$OUTPUT_FILE"
            printf '    "vendor": "15b3"\n' >> "$OUTPUT_FILE"
            printf '  }\n' >> "$OUTPUT_FILE"
          fi
        done
      fi
    done

    # Close JSON array
    echo "" >> "$OUTPUT_FILE"
    echo "]" >> "$OUTPUT_FILE"

    echo "=== Discovery Complete ==="
    echo "Discovered ports saved to $OUTPUT_FILE"
    cat "$OUTPUT_FILE"

    # Also save to a node-specific location using NODE_NAME env var
    if [ -n "${NODE_NAME:-}" ]; then
      NODE_OUTPUT="/discovery/${NODE_NAME}-ports.json"
      cp "$OUTPUT_FILE" "$NODE_OUTPUT"
      echo "Also saved to $NODE_OUTPUT"
    fi

    echo ""
    echo "=== Discovery Complete - VF creation delegated to SR-IOV operator ==="
