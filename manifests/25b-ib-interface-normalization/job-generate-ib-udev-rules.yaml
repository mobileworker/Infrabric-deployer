---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ib-udev-generator
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "25"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ib-udev-generator
  annotations:
    argocd.argoproj.io/sync-wave: "25"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "nodes", "namespaces"]
    verbs: ["get", "list", "create", "watch", "delete"]
  - apiGroups: ["machineconfiguration.openshift.io"]
    resources: ["machineconfigs", "machineconfigpools"]
    verbs: ["get", "list", "create", "update", "patch", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ib-udev-generator
  annotations:
    argocd.argoproj.io/sync-wave: "25"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ib-udev-generator
subjects:
  - kind: ServiceAccount
    name: ib-udev-generator
    namespace: default
---
apiVersion: batch/v1
kind: Job
metadata:
  name: generate-ib-udev-rules
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: ib-udev-generator
    spec:
      serviceAccountName: ib-udev-generator
      restartPolicy: OnFailure
      containers:
        - name: generator
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "=========================================="
              echo "InfiniBand Interface Name Normalizer"
              echo "Wave 25: Runs BEFORE NIC discovery"
              echo "=========================================="
              echo ""
              echo "This job:"
              echo "  1. Discovers InfiniBand NICs on all nodes"
              echo "  2. Generates udev rules for consistent naming"
              echo "  3. Applies MachineConfig to rename interfaces"
              echo "  4. Waits for nodes to reboot"
              echo ""

              # Install dependencies
              echo "Installing dependencies..."
              dnf install -y python3 jq >/dev/null 2>&1

              # Get worker nodes
              WORKER_NODES=$(oc get nodes -l node-role.kubernetes.io/worker -o jsonpath='{.items[*].metadata.name}')

              if [ -z "$WORKER_NODES" ]; then
                echo "No worker nodes found - skipping"
                exit 0
              fi

              NODE_COUNT=$(echo $WORKER_NODES | wc -w)
              echo "Found $NODE_COUNT worker nodes"
              echo ""

              # Discover IB NICs
              echo "=== Discovering InfiniBand NICs ==="
              mkdir -p /tmp/discovery

              for NODE in $WORKER_NODES; do
                echo "Node: $NODE"

                # Discover IB interfaces using oc debug
                oc debug node/$NODE --image=registry.access.redhat.com/ubi9/ubi:latest -- bash -c '
                  chroot /host bash -c "
                    for iface in /sys/class/net/*; do
                      ifname=\$(basename \$iface)
                      # Check if InfiniBand interface
                      if [ -d \"/sys/class/net/\$ifname/device/infiniband\" ] || [[ \$ifname == ib* ]]; then
                        pci_path=\$(readlink -f /sys/class/net/\$ifname/device 2>/dev/null || echo unknown)
                        pci=\$(basename \$pci_path)
                        # Verify it is actually InfiniBand (not RoCE)
                        ib_dev=\$(ls /sys/class/net/\$ifname/device/infiniband 2>/dev/null | head -1)
                        if [ -n \"\$ib_dev\" ]; then
                          link_layer=\$(cat /sys/class/infiniband/\$ib_dev/ports/1/link_layer 2>/dev/null || echo unknown)
                          if [[ \$link_layer == *InfiniBand* ]]; then
                            echo \"\$ifname|\$pci\"
                          fi
                        fi
                      fi
                    done
                  "
                ' 2>&1 | grep -v "Starting pod" | grep -v "Removing debug pod" | grep -v "To use host binaries" | while IFS='|' read -r ifname pci; do
                  # Filter out error messages and lines without valid PCI addresses
                  if [ -n "$ifname" ] && [ "$pci" != "unknown" ] && [ -n "$pci" ] && [[ ! "$ifname" =~ ^E[0-9] ]]; then
                    echo "  $ifname (PCI: $pci)"
                    echo "$NODE|$ifname|$pci" >> /tmp/discovery/all-ibs.txt
                  fi
                done
              done

              if [ ! -f /tmp/discovery/all-ibs.txt ]; then
                echo ""
                echo "No InfiniBand devices found - skipping normalization"
                exit 0
              fi

              echo ""
              echo "=== Generating Udev Rules ==="

              # Generate udev rules with Python
              python3 << 'EOF'
              import base64
              import json
              from collections import defaultdict

              # Collect all devices with their PCI addresses
              pci_to_nodes = defaultdict(list)  # PCI -> list of (node, ifname)

              with open('/tmp/discovery/all-ibs.txt', 'r') as f:
                for line in f:
                  node, ifname, pci = line.strip().split('|')
                  pci_to_nodes[pci].append({'node': node, 'ifname': ifname})

              # Get all unique PCI addresses and sort them globally
              all_pci_addresses = sorted(pci_to_nodes.keys())

              print(f"Total unique InfiniBand NICs: {len(all_pci_addresses)}")

              # Map PCI address -> normalized name
              pci_to_name = {}
              for pos, pci in enumerate(all_pci_addresses):
                norm_name = f"ib_nic{pos}"
                pci_to_name[pci] = norm_name
                nodes_with_nic = sorted(set(d['node'] for d in pci_to_nodes[pci]))
                print(f"  {norm_name} ← PCI {pci} (on {len(nodes_with_nic)} node(s))")

              # Generate udev rules
              rules = [
                "# Auto-generated udev rules to normalize InfiniBand interface names",
                "# Each PCI address gets a globally consistent name across all nodes",
                "# Generated by ib-udev-generator job",
                ""
              ]

              for pos, pci in enumerate(all_pci_addresses):
                norm_name = f"ib_nic{pos}"
                rules.append(f"# {norm_name} <- PCI {pci}")
                rules.append(f'SUBSYSTEM=="net", ACTION=="add", KERNELS=="{pci}", NAME="{norm_name}"')
                rules.append("")

              udev_content = '\n'.join(rules)
              udev_b64 = base64.b64encode(udev_content.encode()).decode()

              # Generate MachineConfig
              mc = {
                "apiVersion": "machineconfiguration.openshift.io/v1",
                "kind": "MachineConfig",
                "metadata": {
                  "labels": {"machineconfiguration.openshift.io/role": "worker"},
                  "name": "99-worker-normalize-ib-interfaces"
                },
                "spec": {
                  "config": {
                    "ignition": {"version": "3.2.0"},
                    "storage": {
                      "files": [{
                        "contents": {"source": f"data:text/plain;charset=utf-8;base64,{udev_b64}"},
                        "mode": 420,
                        "overwrite": True,
                        "path": "/etc/udev/rules.d/99-normalize-ib-interfaces.rules"
                      }]
                    }
                  }
                }
              }

              with open('/tmp/mc.json', 'w') as f:
                json.dump(mc, f)
              EOF

              # Apply MachineConfig
              echo ""
              echo "=== Applying MachineConfig ==="
              oc apply -f /tmp/mc.json

              echo "✓ MachineConfig created: 99-worker-normalize-ib-interfaces"
              echo ""
              echo "⚠ Worker nodes will reboot to apply changes"
              echo ""
              echo "New interface names: ib_nic0, ib_nic1, ib_nic2, etc."
              echo "Monitor: oc get mcp worker -w"
              echo ""
              echo "=== Job Complete ==="
