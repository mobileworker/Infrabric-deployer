apiVersion: v1
kind: Service
metadata:
  name: llm-d-inference
  namespace: llm-d
  labels:
    app: llm-d
    component: pd-disaggregation-multinode
    llm-d.ai/inference-serving: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "24"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      protocol: TCP
      targetPort: 8000
  selector:
    llm-d.ai/inference-serving: "true"
