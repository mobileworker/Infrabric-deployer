apiVersion: v1
kind: ConfigMap
metadata:
  name: gaie-inference-scheduling-values
  namespace: llm-d
  labels:
    app: llm-d
    component: inference-scheduling
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    description: "GAIE InferencePool Helm values for inference scheduling"
data:
  gateway.yaml: |
    apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: infra-inference-scheduling-gateway
      namespace: llm-d
      annotations:
        argocd.argoproj.io/sync-wave: "25"
    spec:
      gatewayClassName: istio
      listeners:
        - name: http
          port: 80
          protocol: HTTP

  values.yaml: |
    inferenceExtension:
      replicas: 1
      flags:
        kv-cache-usage-percentage-metric: "vllm:kv_cache_usage_perc"
      image:
        name: llm-d-inference-scheduler
        hub: ghcr.io/llm-d
        tag: v0.5.0
        pullPolicy: Always
      extProcPort: 9002
      pluginsConfigFile: "default-plugins.yaml"
      monitoring:
        interval: "10s"
        secret:
          name: inference-scheduling-gateway-sa-metrics-reader-secret
        prometheus:
          enabled: true
          auth:
            enabled: true

    inferencePool:
      targetPorts:
        - number: 8000
      modelServerType: vllm
      modelServers:
        matchLabels:
          llm-d.ai/inference-serving: "true"
          llm-d.ai/guide: "inference-scheduling"
