apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wide-aggregated-route
  namespace: llm-d
  labels:
    app: llm-d
    component: multinode-aggregated
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    description: "Routes inference requests to wide-aggregated InferencePool"
spec:
  parentRefs:
    - name: infra-aggregated-gateway
      namespace: llm-d
  rules:
    - backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: gaie-aggregated
          namespace: llm-d
          port: 8000
          weight: 1
