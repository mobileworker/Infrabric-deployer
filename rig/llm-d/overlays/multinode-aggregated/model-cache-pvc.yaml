apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wide-aggregated-model-cache
  namespace: llm-d
  labels:
    app: llm-d
    component: multinode-aggregated
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    description: "Shared model cache for multi-node deployments"
spec:
  accessModes:
    - ReadWriteMany  # Required for NFS to allow multiple pods to mount
  storageClassName: nfs-disk-1-sc  # REPLACE with your NFS storage class
  resources:
    requests:
      storage: 1Ti  # 1TB for model cache and headroom
