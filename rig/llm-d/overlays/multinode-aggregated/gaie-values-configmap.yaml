apiVersion: v1
kind: ConfigMap
metadata:
  name: gaie-aggregated-values
  namespace: llm-d
  labels:
    app: llm-d
    component: multinode-aggregated
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    description: "GAIE InferencePool Helm values for wide-aggregated"
data:
  gateway.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: infra-aggregated-gateway
      namespace: llm-d
      labels:
        app: llm-d
        component: multinode-aggregated
    data:
      deployment: |
        spec:
          template:
            spec:
              containers:
              - name: istio-proxy
                resources:
                  limits:
                    cpu: "2"
                    memory: 4Gi
                  requests:
                    cpu: 100m
                    memory: 512Mi
      service: |
        spec:
          type: "ClusterIP"
    ---
    apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: infra-aggregated-gateway
      namespace: llm-d
      labels:
        app: llm-d
        component: multinode-aggregated
        istio.io/enable-inference-extproc: "true"
    spec:
      gatewayClassName: "istio"
      listeners:
        - port: 80
          protocol: HTTP
          name: default
          allowedRoutes:
            namespaces:
              from: All
      infrastructure:
        parametersRef:
          name: infra-aggregated-gateway
          group: ""
          kind: ConfigMap
    ---
    apiVersion: telemetry.istio.io/v1
    kind: Telemetry
    metadata:
      name: infra-aggregated-gateway-telemetry
      namespace: llm-d
    spec:
      targetRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: infra-aggregated-gateway
      accessLogging:
      - disabled: true

  values.yaml: |
    inferenceExtension:
      replicas: 1
      flags:
        # vLLM 10.0+ renamed the metric
        kv-cache-usage-percentage-metric: "vllm:kv_cache_usage_perc"
        v: 1
      image:
        name: llm-d-inference-scheduler
        hub: ghcr.io/llm-d
        tag: v0.6.0
        pullPolicy: Always
      extProcPort: 9002
      # Aggregated mode - no P/D separation, just load balancing
      pluginsConfigFile: "aggregated-config.yaml"
      pluginsCustomConfig:
        aggregated-config.yaml: |
          # Aggregated deployment - standard load balancing without P/D separation
          apiVersion: inference.networking.x-k8s.io/v1alpha1
          kind: EndpointPickerConfig
          plugins:
          - type: queue-scorer
          - type: kv-cache-utilization-scorer
          - type: max-score-picker
          schedulingProfiles:
          - name: default
            plugins:
            - pluginRef: max-score-picker
            - pluginRef: queue-scorer
              weight: 1
            - pluginRef: kv-cache-utilization-scorer
              weight: 2
      tracing:
        enabled: false
      monitoring:
        interval: "10s"
        prometheus:
          enabled: true
          auth:
            secretName: aggregated-gateway-sa-metrics-reader-secret

    inferencePool:
      targetPorts:
        - number: 8000
      modelServerType: vllm
      modelServers:
        matchLabels:
          llm-d.ai/inference-serving: "true"
          llm-d.ai/guide: "multinode-aggregated"
          llm-d.ai/model: "Qwen3-235B"

    provider:
      name: istio
      istio:
        destinationRule:
          host: gaie-aggregated-epp
          trafficPolicy:
            tls:
              mode: SIMPLE
              insecureSkipVerify: true
            connectionPool:
              http:
                http1MaxPendingRequests: 256000
                maxRequestsPerConnection: 256000
                http2MaxRequests: 256000
                idleTimeout: "900s"
              tcp:
                maxConnections: 256000
                maxConnectionDuration: "1800s"
                connectTimeout: "900s"
