apiVersion: v1
kind: ConfigMap
metadata:
  name: ms-manifests-aggregated
  namespace: llm-d
  labels:
    app: llm-d
    component: multinode-aggregated
  annotations:
    argocd.argoproj.io/sync-wave: "20"
data:
  aggregated-lws.yaml: |
    apiVersion: leaderworkerset.x-k8s.io/v1
    kind: LeaderWorkerSet
    metadata:
      name: wide-aggregated
      namespace: llm-d
    spec:
      replicas: 1  # PLACEHOLDER: Will be patched dynamically to NODE_COUNT
      leaderWorkerTemplate:
        size: 1
        workerTemplate:
          spec:
            serviceAccountName: llm-d-modelserver
            volumes:
              - name: dshm
                emptyDir:
                  medium: Memory
                  sizeLimit: 2Gi
              - name: hf-cache
                persistentVolumeClaim:
                  claimName: wide-aggregated-model-cache
              - name: jit-cache
                emptyDir: {}
            containers:
              - name: vllm
                image: ghcr.io/llm-d/llm-d-cuda:v0.5.1-rc.5
                securityContext:
                  capabilities:
                    add:
                      - IPC_LOCK
                      - SYS_RAWIO
                  runAsGroup: 0
                  runAsUser: 0
                imagePullPolicy: Always
                command:
                  - /bin/bash
                  - -c
                args:
                  - |-
                    # Clear /dev/shm on start to prevent running out of space when crashes occur
                    find /dev/shm -type f -delete

                    #################
                    # RUN vLLM aggregated server
                    #################
                    exec vllm serve \
                      RedHatAI/Qwen3-235B-A22B-FP8-dynamic \
                      --port 8000 \
                      --trust-remote-code \
                      --disable-uvicorn-access-log \
                      --tensor-parallel-size 8 \
                      --max-model-len 40960 \
                      --gpu-memory-utilization 0.95
                env:
                  - name: HF_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: llm-d-hf-token
                        key: HF_TOKEN
                        optional: false
                  - name: TRITON_LIBCUDA_PATH
                    value: /usr/lib64
                  - name: VLLM_LOGGING_LEVEL
                    value: INFO
                  - name: CUDA_CACHE_PATH
                    value: /var/cache/vllm/cuda
                  - name: CCACHE_DIR
                    value: /var/cache/vllm/ccache
                  - name: VLLM_CACHE_ROOT
                    value: /var/cache/vllm/vllm
                  - name: FLASHINFER_WORKSPACE_BASE
                    value: /var/cache/vllm/flashinfer
                  - name: HF_HUB_CACHE
                    value: /var/cache/huggingface
                  - name: RAYON_NUM_THREADS
                    value: "1"

                ports:
                  - containerPort: 8000
                    name: http
                    protocol: TCP
                startupProbe:
                  httpGet:
                    path: /health
                    port: http
                  initialDelaySeconds: 0
                  periodSeconds: 1
                  timeoutSeconds: 5
                  failureThreshold: 4500
                livenessProbe:
                  httpGet:
                    path: /health
                    port: http
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
                readinessProbe:
                  httpGet:
                    path: /v1/models
                    port: http
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                resources:
                  limits:
                    ephemeral-storage: 1Ti
                    memory: 512Gi  # PLACEHOLDER: Will be patched dynamically
                    nvidia.com/gpu: "8"  # PLACEHOLDER: Will be patched dynamically
                  requests:
                    cpu: 32
                    ephemeral-storage: 1Ti
                    memory: 512Gi  # PLACEHOLDER: Will be patched dynamically
                    nvidia.com/gpu: "8"  # PLACEHOLDER: Will be patched dynamically
                volumeMounts:
                  - name: dshm
                    mountPath: /dev/shm
                  - name: hf-cache
                    mountPath: /var/cache/huggingface
                  - name: jit-cache
                    mountPath: /var/cache/vllm
