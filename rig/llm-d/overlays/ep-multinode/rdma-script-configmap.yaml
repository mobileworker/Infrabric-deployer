apiVersion: v1
kind: ConfigMap
metadata:
  name: ib-hca-discovery-script
  namespace: llm-d
  labels:
    app: llm-d
    component: wide-ep-multinode
  annotations:
    argocd.argoproj.io/sync-wave: "20"
data:
  discover.sh: |
    #!/bin/bash
    set -e

    # --- SCRIPT CONFIGURATION ---
    ulimit -l unlimited || true

    echo "--- Running InfiniBand HCA discovery script (DYNAMIC FILTERING) ---" >&2

    # --- VALIDATE PREREQUISITES ---
    if [[ ! -d "/sys/class/infiniband" ]]; then
        echo "Error: /sys/class/infiniband directory not found." >&2
        exit 1
    fi

    # --- STEP 1: DISCOVER ACCESSIBLE INFINIBAND DEVICES ---
    # Check /dev/infiniband/uverbs* to see what devices are actually accessible to this pod
    declare -a accessible_devices=()

    echo "--- Checking accessible InfiniBand devices in /dev/infiniband/ ---" >&2

    for dev in /dev/infiniband/uverbs*; do
        if [[ -c "$dev" ]]; then
            # Extract device number (e.g., uverbs4 -> 4)
            dev_num=$(basename "$dev" | sed 's/uverbs//')
            accessible_devices+=("$dev_num")
            echo "Found accessible device: uverbs${dev_num}" >&2
        fi
    done

    if [[ "${#accessible_devices[@]}" -eq 0 ]]; then
        echo "Error: No accessible InfiniBand devices found in /dev/infiniband/" >&2
        exit 1
    fi

    # --- STEP 2: MAP ACCESSIBLE DEVICES TO HCAs ---
    declare -a accessible_hcas=()

    echo "--- Mapping accessible devices to HCA names ---" >&2

    for dev_num in "${accessible_devices[@]}"; do
        hca="mlx5_${dev_num}"
        hca_path="/sys/class/infiniband/${hca}"

        if [[ -d "$hca_path" ]]; then
            # Check if port 1 is active
            port_state=""
            if [[ -f "$hca_path/ports/1/state" ]]; then
                port_state=$(cat "$hca_path/ports/1/state" 2>/dev/null | grep -o "ACTIVE" || true)
            fi

            if [[ "$port_state" == "ACTIVE" ]]; then
                accessible_hcas+=("$hca")
                echo "Mapped: uverbs${dev_num} -> ${hca} (ACTIVE)" >&2
            else
                echo "Warning: ${hca} exists but port is not ACTIVE" >&2
            fi
        else
            echo "Warning: Device uverbs${dev_num} exists but ${hca} sysfs path not found" >&2
        fi
    done

    if [[ "${#accessible_hcas[@]}" -eq 0 ]]; then
        echo "Error: No active HCAs found for accessible devices." >&2
        exit 1
    fi

    # Sort HCAs by device number
    sorted_hcas=($(for hca in "${accessible_hcas[@]}"; do echo "$hca"; done | sort -V))
    echo "--- Discovery complete: ${#sorted_hcas[@]} accessible active HCAs found. ---" >&2

    # --- STEP 3: NETWORK CONFIGURATION ---
    # Management IP (eth0)
    MGMT_IP=$(ip -4 addr show eth0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | head -n 1 || true)

    echo "--- Network Configuration ---" >&2
    echo "Management Interface (eth0): $MGMT_IP" >&2
    echo "Note: Pure RDMA mode - no IP addressing on InfiniBand" >&2

    # --- STEP 4: EXPORT VARIABLES ---
    declare -A env_vars

    # RDMA Hardware Config - Points ONLY to accessible HCAs
    declare -a hcas_with_port
    for hca in "${sorted_hcas[@]}"; do
        hcas_with_port+=("${hca}:1")
    done

    env_vars["NCCL_IB_HCA"]="$(IFS=','; echo "${hcas_with_port[*]}")"
    env_vars["NVSHMEM_HCA_LIST"]="$(IFS=','; echo "${hcas_with_port[*]}")"
    env_vars["UCX_NET_DEVICES"]="$(IFS=','; echo "${hcas_with_port[*]}")"

    # Socket/Bootstrap Config (eth0 for management)
    env_vars["NCCL_SOCKET_IFNAME"]="eth0"
    env_vars["GLOO_SOCKET_IFNAME"]="eth0"
    env_vars["NVSHMEM_BOOTSTRAP_UID_SOCK_IFNAME"]="eth0"

    # Management IP
    env_vars["MGMT_IP"]="${MGMT_IP}"
    env_vars["VLLM_NIXL_SIDE_CHANNEL_HOST"]="${MGMT_IP}"

    # LWS Leader logic
    if [[ -z "$LWS_LEADER_ADDRESS" ]]; then
       env_vars["FINAL_LEADER_IP"]="${MGMT_IP}"
    else
       env_vars["FINAL_LEADER_IP"]="${LWS_LEADER_ADDRESS}"
    fi

    # Write environment file
    EXPORT_FILE="/data/vllm_env.sh"
    echo "#!/bin/bash" > "$EXPORT_FILE"
    while IFS= read -r key; do
        value="${env_vars[$key]}"
        printf "export %s='%s'\n" "$key" "$value" >> "$EXPORT_FILE"
    done < <(printf "%s\n" "${!env_vars[@]}")

    echo "--- Discovery script finished. Config saved to $EXPORT_FILE ---" >&2
