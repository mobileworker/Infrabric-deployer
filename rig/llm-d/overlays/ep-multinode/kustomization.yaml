apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: namespace field removed from overlay level to avoid transforming istio-system
# All resources explicitly set their namespace in metadata

# Wide-EP Multi-Node Deployment
# Deploy DeepSeek-R1-0528 with Expert Parallelism across multiple GPU nodes
# Usage: oc apply -k rig/llm-d/overlays/ep-multinode

resources:
  # Wave -1: Namespace + RBAC + Resource Discovery
  - ../../prereq/client-tools
  - ../../prereq/resource-discovery

  # Wave 5: Istio namespace
  # Wave 10: Create model cache PVC
  - model-cache-pvc.yaml              # Shared NFS PVC for model cache

  # Wave 10: Install Istio gateway
  # Wave 15: Download model to PVC, Install InferencePool controller, Enable metrics
  - model-download-job.yaml           # Pre-download model to shared PVC
  - ../../prereq/istio-gateway
  - ../../prereq/inferencepool-controller
  - ../../prereq/vllm-metrics          # Prometheus metrics scraping for vLLM

  # Wave 20: RDMA Configuration and Manifests
  - rdma-script-configmap.yaml       # InfiniBand HCA discovery script
  - gaie-values-configmap.yaml        # InferencePool configuration (Helm values)
  - ms-manifests-configmap.yaml       # Model server LeaderWorkerSet manifests

  # Wave 25: Deploy Wide-EP Multi-Node (waits for model download)
  - deploy-ep-job.yaml                # Deployment job

  # Wave 30: HTTP Routing
  - httproute.yaml                    # Routes inference requests to InferencePool

  # Wave 35: External Access
  - gateway-route.yaml                # OpenShift Route for external access

# Labels - using 'labels' instead of 'commonLabels' to avoid adding to service selectors
labels:
  - pairs:
      app.kubernetes.io/name: llm-d
      app.kubernetes.io/component: ep-multinode
      deployment-type: ep-multinode
    includeSelectors: false

# No patches needed - all configuration is in manifests
