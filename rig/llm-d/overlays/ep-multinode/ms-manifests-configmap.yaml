                securityContext:
                  capabilities:
                    add:
                      - IPC_LOCK
                  runAsGroup: 0
                  runAsUser: 0
              - name: routing-proxy
                args:
                  - --port=8000
                  - --vllm-port=8200
                  - --connector=nixlv2
                  - --zap-log-level=1
                  - --secure-proxy=false
                  - --enable-prefiller-sampling
                image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.6.0
                imagePullPolicy: Always
                ports:
                  - containerPort: 8000
                    name: sidecar
                    protocol: TCP
                resources: {}
                restartPolicy: Always
                securityContext:
                  allowPrivilegeEscalation: false
                  runAsNonRoot: true
            volumes:
              - name: dshm
                emptyDir:
                  medium: Memory
                  sizeLimit: 2Gi
              - name: hf-cache
                persistentVolumeClaim:
                  claimName: wide-ep-model-cache
              - name: jit-cache
