apiVersion: v1
kind: ConfigMap
metadata:
  name: ms-ep-manifests
  namespace: llm-d
  labels:
    app: llm-d
    component: wide-ep-multinode
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    description: "Model server Kubernetes manifests - Multi-node Wide-EP"
data:
  ep-lws.yaml: |
    ---
    apiVersion: leaderworkerset.x-k8s.io/v1
    kind: LeaderWorkerSet
    metadata:
      name: wide-ep-prefill
      namespace: llm-d
      labels:
        llm-d.ai/inference-serving: "true"
        llm-d.ai/guide: "wide-ep-multinode"
        llm-d.ai/accelerator-variant: "gpu"
        llm-d.ai/accelerator-vendor: "nvidia"
        llm-d.ai/model: Qwen3-235B-FP8-dynamic
        llm-d.ai/role: prefill
    spec:
      replicas: 1
      leaderWorkerTemplate:
        size: 1
        workerTemplate:
          metadata:
            labels:
              llm-d.ai/inference-serving: "true"
              llm-d.ai/guide: "wide-ep-multinode"
              llm-d.ai/accelerator-variant: "gpu"
              llm-d.ai/accelerator-vendor: "nvidia"
              llm-d.ai/model: Qwen3-235B-FP8-dynamic
              llm-d.ai/role: prefill
          spec:
            serviceAccountName: llm-d-modelserver
            initContainers:
              - name: rdma-discovery
                image: ghcr.io/llm-d/llm-d-cuda:v0.5.1
                command: ["/bin/bash", "-c"]
                args:
                  - |
                    echo "RDMA discovery will run in main container (which has RDMA resources allocated)"
                    echo "Init container complete"
                volumeMounts:
                  - name: discovery-script
                    mountPath: /scripts
                  - name: discovery-data
                    mountPath: /data
                securityContext:
                  capabilities:
                    add:
                      - IPC_LOCK
                  runAsGroup: 0
                  runAsUser: 0
            volumes:
              - name: dshm
                emptyDir:
                  medium: Memory
                  sizeLimit: 2Gi
              - name: hf-cache
                persistentVolumeClaim:
                  claimName: wide-ep-model-cache
              - name: jit-cache
                emptyDir: {}
              - name: discovery-script
                configMap:
                  name: ib-hca-discovery-script
                  defaultMode: 0755
              - name: discovery-data
                emptyDir: {}
            containers:
              - name: vllm
                image: ghcr.io/llm-d/llm-d-cuda:v0.5.1
                securityContext:
                  capabilities:
                    add:
                      - IPC_LOCK
                      - SYS_RAWIO
                      - SYS_RESOURCE
                  runAsGroup: 0
                  runAsUser: 0
                imagePullPolicy: Always
                command:
                  - /bin/bash
                  - -c
                args:
                  - |-
                    # Clear /dev/shm on start to prevent running out of space when crashes occur
                    # https://github.com/llm-d/llm-d/issues/352
                    find /dev/shm -type f -delete

                    # Run RDMA discovery (main container has RDMA resources allocated)
                    echo "Running RDMA discovery..."
                    /scripts/discover.sh
                    echo "--- RDMA Discovery Complete ---"
                    cat /data/vllm_env.sh

                    # Source RDMA discovery environment variables
                    if [ -f /data/vllm_env.sh ]; then
                      echo "Loading RDMA configuration..."
                      source /data/vllm_env.sh
                      env | grep -E "NCCL_|NVSHMEM_|UCX_|MGMT_|DATA_" | sort
                    fi

                    #################
                    # RUN vLLM prefill worker (Wide-EP)
                    #################
                    START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                    # Set unlimited locked memory for RDMA/NVSHMEM
                    echo "Setting ulimit -l unlimited..."
                    if ulimit -l unlimited; then
                      echo "SUCCESS: ulimit -l set to unlimited (was: $(ulimit -H -l))"
                      echo "Current soft limit: $(ulimit -l)"
                    else
                      echo "ERROR: Failed to set ulimit -l unlimited"
                      exit 1
                    fi

                    exec vllm serve \
                      RedHatAI/Qwen3-235B-A22B-FP8-dynamic \
                      --port 8000 \
                      --trust-remote-code \
                      --disable-uvicorn-access-log \
                      --data-parallel-hybrid-lb \
                      --enable-expert-parallel \
                      --tensor-parallel-size $TP_SIZE \
                      --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                      --data-parallel-size-local $DP_SIZE_LOCAL \
                      --data-parallel-address ${LWS_LEADER_ADDRESS} \
                      --data-parallel-rpc-port 5555 \
                      --data-parallel-start-rank $START_RANK \
                      --kv_transfer_config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail"}' \
                      --async-scheduling \
                      --enable-eplb \
                      --eplb-config '{"window_size":"1000","step_interval":"3000","num_redundant_experts":"0","log_balancedness":"False"}' \
                      --all2all-backend deepep_high_throughput \
                      --max-model-len 40960 \
                      --gpu-memory-utilization 0.75

                env:
                  - name: HF_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: llm-d-hf-token
                        key: HF_TOKEN
                        optional: false
                  # LeaderWorkerSet worker index (injected from pod label)
                  - name: LWS_WORKER_INDEX
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.labels['leaderworkerset.sigs.k8s.io/worker-index']
                  # CUDA Forward Compatibility for driver 580 (CUDA 13) with CUDA 12.x binaries
                  - name: CUDA_COMPAT_MAX_THREADS
                    value: "256"
                  - name: __CUDA_COMPAT_TIMEOUT
                    value: "120"
                  - name: NVIDIA_DISABLE_REQUIRE
                    value: "true"
                  - name: DP_SIZE_LOCAL
                    value: "8"
                  - name: TP_SIZE
                    value: "1"
                  - name: TRITON_LIBCUDA_PATH
                    value: /usr/lib64
                  - name: VLLM_SKIP_P2P_CHECK
                    value: "1"
                  - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                    value: "1"
                  - name: VLLM_ALL2ALL_BACKEND
                    value: deepep_high_throughput
                  - name: NVIDIA_GDRCOPY
                    value: enabled
                  - name: NVSHMEM_REMOTE_TRANSPORT
                    value: ibgda
                  - name: NVSHMEM_IB_ENABLE_IBGDA
                    value: "true"
                  - name: NVSHMEM_BOOTSTRAP_UID_SOCK_IFNAME
                    value: eth0
                  - name: GLOO_SOCKET_IFNAME
                    value: eth0
                  - name: NCCL_SOCKET_IFNAME
                    value: eth0
                  - name: VLLM_LOGGING_LEVEL
                    value: INFO
                  - name: VLLM_ENGINE_READY_TIMEOUT_S
                    value: "10000"
                  - name: NCCL_DEBUG
                    value: INFO
                  - name: NCCL_DEBUG_SUBSYS
                    value: ALL
                  - name: NCCL_DEBUG_FILE
                    value: /var/cache/huggingface/nccl-debug-%h-%p.txt
                  - name: NVSHMEM_DEBUG
                    value: INFO
                  - name: VLLM_NIXL_SIDE_CHANNEL_HOST
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: CUDA_CACHE_PATH
                    value: /var/cache/vllm/cuda
                  - name: CCACHE_DIR
                    value: /var/cache/vllm/ccache
                  - name: VLLM_CACHE_ROOT
                    value: /var/cache/vllm/vllm
                  - name: FLASHINFER_WORKSPACE_BASE
                    value: /var/cache/vllm/flashinfer
                  - name: HF_HUB_CACHE
                    value: /var/cache/huggingface
                  - name: UCX_MAX_RMA_RAILS
                    value: "1"
                  - name: RAYON_NUM_THREADS
                    value: "1"

                ports:
                  - containerPort: 8000
                    name: vllm
                    protocol: TCP
                  - containerPort: 5600
                    name: nixl
                    protocol: TCP
                startupProbe:
                  httpGet:
                    path: /health
                    port: vllm
                  initialDelaySeconds: 0
                  periodSeconds: 1
                  timeoutSeconds: 5
                  failureThreshold: 2700
                livenessProbe:
                  httpGet:
                    path: /health
                    port: vllm
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
                readinessProbe:
                  httpGet:
                    path: /v1/models
                    port: vllm
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                resources:
                  limits:
                    ephemeral-storage: 1Ti
                    memory: 512Gi
                    nvidia.com/gpu: "8"
                  requests:
                    cpu: 32
                    ephemeral-storage: 1Ti
                    memory: 512Gi
                    nvidia.com/gpu: "8"
                volumeMounts:
                  - name: dshm
                    mountPath: /dev/shm
                  - name: hf-cache
                    mountPath: /var/cache/huggingface
                  - name: jit-cache
                    mountPath: /var/cache/vllm
                  - name: discovery-script
                    mountPath: /scripts
                  - name: discovery-data
                    mountPath: /data
    ---
    apiVersion: leaderworkerset.x-k8s.io/v1
    kind: LeaderWorkerSet
    metadata:
      name: wide-ep-decode
      namespace: llm-d
      labels:
        llm-d.ai/inference-serving: "true"
        llm-d.ai/guide: "wide-ep-multinode"
        llm-d.ai/accelerator-variant: "gpu"
        llm-d.ai/accelerator-vendor: "nvidia"
        llm-d.ai/model: Qwen3-235B-FP8-dynamic
        llm-d.ai/role: decode
    spec:
      replicas: 1
      leaderWorkerTemplate:
        size: 1
        workerTemplate:
          metadata:
            labels:
              llm-d.ai/inference-serving: "true"
              llm-d.ai/guide: "wide-ep-multinode"
              llm-d.ai/accelerator-variant: "gpu"
              llm-d.ai/accelerator-vendor: "nvidia"
              llm-d.ai/model: Qwen3-235B-FP8-dynamic
              llm-d.ai/role: decode
          spec:
            serviceAccountName: llm-d-modelserver
            initContainers:
              - name: rdma-discovery
