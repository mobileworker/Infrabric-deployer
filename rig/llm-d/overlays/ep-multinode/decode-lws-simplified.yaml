apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-decode
  namespace: llm-d
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    restartPolicy: RecreateGroupOnPodRestart
    workerTemplate:
      spec:
        serviceAccountName: llm-d-modelserver
        subdomain: wide-ep-decode
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: hf-cache
            persistentVolumeClaim:
              claimName: wide-ep-model-cache
          - name: jit-cache
            emptyDir: {}
        containers:
          - name: routing-proxy
            args:
              - --port=8000
              - --vllm-port=8200
              - --connector=nixlv2
              - --zap-log-level=1
              - --secure-proxy=false
              - --enable-prefiller-sampling
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
            imagePullPolicy: Always
            ports:
              - containerPort: 8000
                name: sidecar
                protocol: TCP
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
          - name: vllm
            image: ghcr.io/llm-d/llm-d-cuda:v0.5.1-rc.5
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |
                # Clear /dev/shm on start
                find /dev/shm -type f -delete

                # Calculate rank based on LWS worker index
                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * 8 ))

                # Worker pods need --headless flag for V1 engine
                if [ "${LWS_WORKER_INDEX:-0}" = "0" ]; then
                  HEADLESS_FLAG=""
                else
                  HEADLESS_FLAG="--headless"
                fi

                exec vllm serve Qwen/Qwen3-235B-A22B-Thinking-2507-FP8 \
                  --port 8200 \
                  --trust-remote-code \
                  $HEADLESS_FLAG \
                  --data-parallel-size 16 \
                  --data-parallel-size-local 8 \
                  --data-parallel-address wide-ep-decode-0.wide-ep-decode.llm-d \
                  --data-parallel-rpc-port 5555 \
                  --data-parallel-start-rank $START_RANK \
                  --tensor-parallel-size 1 \
                  --enable-expert-parallel \
                  --all2all-backend deepep_low_latency \
                  --kv_transfer_config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}' \
                  --eplb-config '{"num_redundant_experts":"0"}' \
                  --async-scheduling \
                  --enable-dbo
            env:
              - name: LWS_LEADER_ADDRESS
                value: wide-ep-decode-0.wide-ep-decode.llm-d
              - name: LWS_WORKER_INDEX
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['leaderworkerset.sigs.k8s.io/worker-index']
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: llm-d-hf-token
                    key: HF_TOKEN
                    optional: false
              - name: VLLM_V1_FORCE_TCP_COORDINATOR
                value: "1"
              - name: VLLM_DIST_HANDSHAKE_TIMEOUT_S
                value: "1200"
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_SKIP_P2P_CHECK
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled
              - name: NVSHMEM_REMOTE_TRANSPORT
                value: ibgda
              - name: NVSHMEM_IB_ENABLE_IBGDA
                value: "true"
              - name: NVSHMEM_BOOTSTRAP_UID_SOCK_IFNAME
                value: eth0
              - name: GLOO_SOCKET_IFNAME
                value: eth0
              - name: NCCL_SOCKET_IFNAME
                value: eth0
              - name: VLLM_LOGGING_LEVEL
                value: DEBUG
              - name: NCCL_DEBUG
                value: INFO
              - name: VLLM_NIXL_SIDE_CHANNEL_HOST
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
              - name: CUDA_CACHE_PATH
                value: /var/cache/vllm/cuda
              - name: CCACHE_DIR
                value: /var/cache/vllm/ccache
              - name: VLLM_CACHE_ROOT
                value: /var/cache/vllm/vllm
              - name: FLASHINFER_WORKSPACE_BASE
                value: /var/cache/vllm/flashinfer
              - name: HF_HUB_CACHE
                value: /var/cache/huggingface
            ports:
              - containerPort: 8200
                name: vllm
                protocol: TCP
              - containerPort: 5600
                name: nixl
                protocol: TCP
            startupProbe:
              httpGet:
                path: /health
                port: vllm
              initialDelaySeconds: 0
              periodSeconds: 1
              timeoutSeconds: 5
              failureThreshold: 4500
            livenessProbe:
              httpGet:
                path: /health
                port: vllm
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /v1/models
                port: vllm
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
            resources:
              limits:
                ephemeral-storage: 1Ti
                memory: 512Gi
                nvidia.com/gpu: "8"
              requests:
                cpu: 32
                ephemeral-storage: 1Ti
                memory: 512Gi
                nvidia.com/gpu: "8"
            volumeMounts:
              - name: dshm
                mountPath: /dev/shm
              - name: hf-cache
                mountPath: /var/cache/huggingface
              - name: jit-cache
                mountPath: /var/cache/vllm
