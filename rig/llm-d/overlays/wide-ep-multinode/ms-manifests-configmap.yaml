apiVersion: v1
kind: ConfigMap
metadata:
  name: ms-ep-manifests
  namespace: llm-d
  labels:
    app: llm-d
    component: wide-ep-multinode
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    description: "Model server Kubernetes manifests - Multi-node Wide-EP"
data:
  ep-lws.yaml: |
    ---
    apiVersion: leaderworkerset.x-k8s.io/v1
    kind: LeaderWorkerSet
    metadata:
      name: wide-ep-prefill
      namespace: llm-d
      labels:
        app: llm-d
        component: wide-ep-multinode
        llm-d.ai/inference-serving: "true"
        llm-d.ai/guide: wide-ep-multinode
        llm-d.ai/role: prefill
        llm-d.ai/model: DeepSeek-R1-0528
    spec:
      replicas: 1
      leaderWorkerTemplate:
        size: 2
        workerTemplate:
          metadata:
            labels:
              llm-d.ai/inference-serving: "true"
              llm-d.ai/guide: wide-ep-multinode
              llm-d.ai/accelerator-variant: "gpu"
              llm-d.ai/accelerator-vendor: "nvidia"
              llm-d.ai/model: DeepSeek-R1-0528
              llm-d.ai/role: prefill
            annotations:
              inference.lanl.gov/model-name: DeepSeek-R1-0528
          spec:
            serviceAccountName: llm-d-modelserver
            volumes:
              - name: dshm
                emptyDir:
                  medium: Memory
                  sizeLimit: 256Gi
              - name: hf-cache
                emptyDir: {}
              - name: jit-cache
                emptyDir: {}
              - name: rdma-script
                configMap:
                  name: ib-hca-discovery-script
                  defaultMode: 0755
              - name: dev-infiniband
                hostPath:
                  path: /dev/infiniband
            containers:
              - name: vllm
                image: ghcr.io/llm-d/llm-d-cuda:v0.5.0
                securityContext:
                  capabilities:
                    add:
                      - IPC_LOCK
                      - SYS_RAWIO
                      - SYS_RESOURCE
                  runAsGroup: 0
                  runAsUser: 0
                imagePullPolicy: Always
                command:
                  - /bin/bash
                  - -c
                args:
                  - |
                    ulimit -l unlimited || true

                    # Source RDMA discovery script if available
                    if [ -f /scripts/discover_ib_hca.sh ]; then
                      source /scripts/discover_ib_hca.sh
                      echo "--- Loaded RDMA environment ---"
                    fi

                    # Clear /dev/shm on start
                    find /dev/shm -type f -delete

                    echo "--- Launching vLLM Prefill (Wide-EP Multi-Node) ---"
                    echo "Model: DeepSeek-R1-0528"
                    echo "TP Size: ${TP_SIZE}"
                    echo "DP Size Local: ${DP_SIZE_LOCAL}"
                    echo "LWS Worker Index: ${LWS_WORKER_INDEX:-0}"
                    echo "LWS Group Size: ${LWS_GROUP_SIZE}"
                    echo "NCCL_IB_HCA: ${NCCL_IB_HCA}"
                    echo "NVSHMEM Transport: ${NVSHMEM_REMOTE_TRANSPORT}"

                    START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                    exec vllm serve \
                      deepseek-ai/DeepSeek-R1-0528 \
                      --port 8000 \
                      --trust-remote-code \
                      --disable-uvicorn-access-log \
                      --data-parallel-hybrid-lb \
                      --enable-expert-parallel \
                      --tensor-parallel-size $TP_SIZE \
                      --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                      --data-parallel-size-local $DP_SIZE_LOCAL \
                      --data-parallel-address ${LWS_LEADER_ADDRESS} \
                      --data-parallel-rpc-port 5555 \
                      --data-parallel-start-rank $START_RANK \
                      --kv_transfer_config '{"kv_connector":"NixlConnector",
                                              "kv_role":"kv_both",
                                              "kv_load_failure_policy":"fail"}' \
                      --async-scheduling \
                      --enable-dbo \
                      --dbo-prefill-token-threshold 32 \
                      --enable-eplb \
                      --eplb-config '{"window_size":"1000",
                                      "step_interval":"3000",
                                      "num_redundant_experts":"32",
                                      "log_balancedness":"False"}' \
                      --gpu-memory-utilization 0.75 \
                      --max-model-len 8192 || sleep infinity

                env:
                  - name: DP_SIZE_LOCAL
                    value: "8"
                  - name: TP_SIZE
                    value: "1"
                  - name: TRITON_LIBCUDA_PATH
                    value: /usr/lib64
                  - name: VLLM_SKIP_P2P_CHECK
                    value: "1"
                  - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                    value: "1"
                  - name: VLLM_USE_DEEP_GEMM
                    value: "1"
                  - name: VLLM_ALL2ALL_BACKEND
                    value: deepep_high_throughput
                  - name: NVIDIA_GDRCOPY
                    value: enabled
                  - name: NVSHMEM_REMOTE_TRANSPORT
                    value: ibgda
                  - name: NVSHMEM_IB_ENABLE_IBGDA
                    value: "true"
                  - name: NVSHMEM_BOOTSTRAP_UID_SOCK_IFNAME
                    value: eth0
                  - name: GLOO_SOCKET_IFNAME
                    value: eth0
                  - name: NCCL_SOCKET_IFNAME
                    value: eth0
                  - name: VLLM_LOGGING_LEVEL
                    value: INFO
                  - name: VLLM_NIXL_SIDE_CHANNEL_HOST
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: CUDA_CACHE_PATH
                    value: /var/cache/vllm/cuda
                  - name: CCACHE_DIR
                    value: /var/cache/vllm/ccache
                  - name: VLLM_CACHE_ROOT
                    value: /var/cache/vllm/vllm
                  - name: FLASHINFER_WORKSPACE_BASE
                    value: /var/cache/vllm/flashinfer
                  - name: HF_HUB_CACHE
                    value: /var/cache/huggingface
                  - name: HF_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: llm-d-hf-token
                        key: HF_TOKEN
                        optional: true

                ports:
                  - containerPort: 8000
                    name: vllm
                    protocol: TCP
                  - containerPort: 5600
                    name: nixl
                    protocol: TCP
                  - containerPort: 5555
                    name: dp-rpc
                    protocol: TCP

                startupProbe:
                  httpGet:
                    path: /health
                    port: vllm
                  initialDelaySeconds: 0
                  periodSeconds: 1
                  timeoutSeconds: 5
                  failureThreshold: 2700

                livenessProbe:
                  httpGet:
                    path: /health
                    port: vllm
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3

                readinessProbe:
                  httpGet:
                    path: /v1/models
                    port: vllm
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3

                resources:
                  limits:
                    ephemeral-storage: 1Ti
                    memory: 512Gi
                    nvidia.com/gpu: "8"
                  requests:
                    cpu: 32
                    ephemeral-storage: 1Ti
                    memory: 512Gi
                    nvidia.com/gpu: "8"

                volumeMounts:
                  - name: dshm
                    mountPath: /dev/shm
                  - name: hf-cache
                    mountPath: /var/cache/huggingface
                  - name: jit-cache
                    mountPath: /var/cache/vllm
                  - name: rdma-script
                    mountPath: /scripts
                  - name: dev-infiniband
                    mountPath: /dev/infiniband
    ---
    apiVersion: leaderworkerset.x-k8s.io/v1
    kind: LeaderWorkerSet
    metadata:
      name: wide-ep-decode
      namespace: llm-d
      labels:
        app: llm-d
        component: wide-ep-multinode
        llm-d.ai/inference-serving: "true"
        llm-d.ai/guide: wide-ep-multinode
        llm-d.ai/role: decode
        llm-d.ai/model: DeepSeek-R1-0528
    spec:
      replicas: 1
      leaderWorkerTemplate:
        size: 2
        workerTemplate:
          metadata:
            labels:
              llm-d.ai/inference-serving: "true"
              llm-d.ai/guide: wide-ep-multinode
              llm-d.ai/accelerator-variant: "gpu"
              llm-d.ai/accelerator-vendor: "nvidia"
              llm-d.ai/model: DeepSeek-R1-0528
              llm-d.ai/role: decode
            annotations:
              inference.lanl.gov/model-name: DeepSeek-R1-0528
          spec:
            serviceAccountName: llm-d-modelserver
            initContainers:
              - name: routing-proxy
                args:
                  - --port=8000
                  - --vllm-port=8200
                  - --connector=nixlv2
                  - --zap-log-level=1
                  - --secure-proxy=false
                  - --enable-prefiller-sampling
                image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
                imagePullPolicy: Always
                ports:
                  - containerPort: 8000
                    name: sidecar
                    protocol: TCP
                resources: {}
                restartPolicy: Always
                securityContext:
                  allowPrivilegeEscalation: false
                  runAsNonRoot: true
            volumes:
              - name: dshm
                emptyDir:
                  medium: Memory
                  sizeLimit: 256Gi
              - name: hf-cache
                emptyDir: {}
              - name: jit-cache
                emptyDir: {}
              - name: rdma-script
                configMap:
                  name: ib-hca-discovery-script
                  defaultMode: 0755
              - name: dev-infiniband
                hostPath:
                  path: /dev/infiniband
            containers:
              - name: vllm
                image: ghcr.io/llm-d/llm-d-cuda:v0.5.0
                securityContext:
                  capabilities:
                    add:
                      - IPC_LOCK
                      - SYS_RAWIO
                      - SYS_RESOURCE
                  runAsGroup: 0
                  runAsUser: 0
                imagePullPolicy: Always
                command:
                  - /bin/bash
                  - -c
                args:
                  - |
                    ulimit -l unlimited || true

                    # Source RDMA discovery script if available
                    if [ -f /scripts/discover_ib_hca.sh ]; then
                      source /scripts/discover_ib_hca.sh
                      echo "--- Loaded RDMA environment ---"
                    fi

                    # Clear /dev/shm on start
                    find /dev/shm -type f -delete

                    echo "--- Launching vLLM Decode (Wide-EP Multi-Node) ---"
                    echo "Model: DeepSeek-R1-0528"
                    echo "TP Size: ${TP_SIZE}"
                    echo "DP Size Local: ${DP_SIZE_LOCAL}"
                    echo "LWS Worker Index: ${LWS_WORKER_INDEX:-0}"
                    echo "LWS Group Size: ${LWS_GROUP_SIZE}"
                    echo "NCCL_IB_HCA: ${NCCL_IB_HCA}"
                    echo "NVSHMEM Transport: ${NVSHMEM_REMOTE_TRANSPORT}"

                    START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                    exec vllm serve \
                      deepseek-ai/DeepSeek-R1-0528 \
                      --port 8200 \
                      --trust-remote-code \
                      --disable-uvicorn-access-log \
                      --data-parallel-hybrid-lb \
                      --enable-expert-parallel \
                      --tensor-parallel-size $TP_SIZE \
                      --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                      --data-parallel-size-local $DP_SIZE_LOCAL \
                      --data-parallel-address ${LWS_LEADER_ADDRESS} \
                      --data-parallel-rpc-port 5555 \
                      --data-parallel-start-rank $START_RANK \
                      --kv_transfer_config '{"kv_connector":"NixlConnector",
                                              "kv_role":"kv_both",
                                              "kv_load_failure_policy":"fail"}' \
                      --async-scheduling \
                      --enable-dbo \
                      --dbo-decode-token-threshold 32 \
                      --enable-eplb \
                      --eplb-config '{"window_size":"1000",
                                      "step_interval":"3000",
                                      "num_redundant_experts":"32",
                                      "log_balancedness":"False"}' \
                      --compilation_config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
                      --kv-cache-memory-bytes=${KV_CACHE_MEMORY_BYTES-} \
                      --max-model-len 8192 || sleep infinity

                env:
                  - name: VLLM_MOE_DP_CHUNK_SIZE
                    value: "384"
                  - name: DP_SIZE_LOCAL
                    value: "8"
                  - name: TP_SIZE
                    value: "1"
                  - name: TRITON_LIBCUDA_PATH
                    value: /usr/lib64
                  - name: VLLM_SKIP_P2P_CHECK
                    value: "1"
                  - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                    value: "1"
                  - name: VLLM_USE_DEEP_GEMM
                    value: "1"
                  - name: VLLM_ALL2ALL_BACKEND
                    value: deepep_low_latency
                  - name: NVIDIA_GDRCOPY
                    value: enabled
                  - name: NVSHMEM_REMOTE_TRANSPORT
                    value: ibgda
                  - name: NVSHMEM_IB_ENABLE_IBGDA
                    value: "true"
                  - name: NVSHMEM_BOOTSTRAP_UID_SOCK_IFNAME
                    value: eth0
                  - name: GLOO_SOCKET_IFNAME
                    value: eth0
                  - name: NCCL_SOCKET_IFNAME
                    value: eth0
                  - name: VLLM_LOGGING_LEVEL
                    value: INFO
                  - name: VLLM_NIXL_SIDE_CHANNEL_HOST
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: CUDA_CACHE_PATH
                    value: /var/cache/vllm/cuda
                  - name: CCACHE_DIR
                    value: /var/cache/vllm/ccache
                  - name: VLLM_CACHE_ROOT
                    value: /var/cache/vllm/vllm
                  - name: FLASHINFER_WORKSPACE_BASE
                    value: /var/cache/vllm/flashinfer
                  - name: HF_HUB_CACHE
                    value: /var/cache/huggingface
                  - name: HF_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: llm-d-hf-token
                        key: HF_TOKEN
                        optional: true

                ports:
                  - containerPort: 8200
                    name: vllm
                    protocol: TCP
                  - containerPort: 5600
                    name: nixl
                    protocol: TCP
                  - containerPort: 5555
                    name: dp-rpc
                    protocol: TCP

                startupProbe:
                  httpGet:
                    path: /health
                    port: vllm
                  initialDelaySeconds: 0
                  periodSeconds: 1
                  timeoutSeconds: 5
                  failureThreshold: 2700

                livenessProbe:
                  httpGet:
                    path: /health
                    port: vllm
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3

                readinessProbe:
                  httpGet:
                    path: /v1/models
                    port: vllm
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3

                resources:
                  limits:
                    ephemeral-storage: 1Ti
                    memory: 512Gi
                    nvidia.com/gpu: "8"
                  requests:
                    cpu: 32
                    ephemeral-storage: 1Ti
                    memory: 512Gi
                    nvidia.com/gpu: "8"

                volumeMounts:
                  - name: dshm
                    mountPath: /dev/shm
                  - name: hf-cache
                    mountPath: /var/cache/huggingface
                  - name: jit-cache
                    mountPath: /var/cache/vllm
                  - name: rdma-script
                    mountPath: /scripts
                  - name: dev-infiniband
                    mountPath: /dev/infiniband
