apiVersion: v1
kind: ConfigMap
metadata:
  name: deepep-test-config
  namespace: llm-d
  labels:
    app: llm-d
    component: deepep-test
  annotations:
    argocd.argoproj.io/sync-wave: "20"
data:
  deepep-test-lws.yaml: |
    apiVersion: leaderworkerset.x-k8s.io/v1
    kind: LeaderWorkerSet
    metadata:
      name: deepep-test
      namespace: llm-d
      labels:
        app: deepep-test-multinode
    spec:
      # NOTE: replicas is auto-configured by deploy-deepep-test-job based on discovered GPU nodes
      # This value will be overwritten during deployment
      replicas: 1  # Placeholder - will be set dynamically
      leaderWorkerTemplate:
        size: 1    # 1 pod per node (fixed)
        workerTemplate:
          metadata:
            labels:
              app: deepep-test-multinode
          spec:
            serviceAccountName: llm-d-modelserver
            volumes:
              - name: test-scripts
                configMap:
                  name: deepep-test-scripts
                  defaultMode: 0755
              - name: dshm
                emptyDir:
                  medium: Memory
                  sizeLimit: 8Gi
              - name: workspace
                emptyDir: {}
            containers:
              - name: test
                image: ghcr.io/llm-d/llm-d-cuda:v0.5.1-rc.5
                securityContext:
                  capabilities:
                    add:
                      - IPC_LOCK
                      - SYS_RAWIO
                  runAsGroup: 0
                  runAsUser: 0
                command: ["/bin/bash", "-c"]
                args:
                  - |
                    # Download DeepEP
                    /tests/get-deepep.sh

                    # Run the test
                    /tests/run-test-multinode.sh
                env:
                  - name: NVIDIA_GDRCOPY
                    value: enabled
                  - name: NVSHMEM_REMOTE_TRANSPORT
                    value: ibgda
                  - name: NVSHMEM_IB_ENABLE_IBGDA
                    value: "true"
                  - name: NVSHMEM_BOOTSTRAP_UID_SOCK_IFNAME
                    value: eth0
                  - name: GLOO_SOCKET_IFNAME
                    value: eth0
                  - name: NCCL_SOCKET_IFNAME
                    value: eth0
                  - name: CUDA_VISIBLE_DEVICES
                    value: "0,1,2,3,4,5,6,7"
                resources:
                  limits:
                    # NOTE: GPU count and RDMA resources are auto-configured during deployment
                    # These placeholders will be replaced with discovered values
                    nvidia.com/gpu: "8"  # Will be set to discovered GPU count
                    memory: 128Gi
                    # RDMA resources will be auto-injected here
                  requests:
                    nvidia.com/gpu: "8"  # Will be set to discovered GPU count
                    memory: 128Gi
                    cpu: 16
                    # RDMA resources will be auto-injected here
                volumeMounts:
                  - name: test-scripts
                    mountPath: /tests
                  - name: dshm
                    mountPath: /dev/shm
                  - name: workspace
                    mountPath: /workspace
