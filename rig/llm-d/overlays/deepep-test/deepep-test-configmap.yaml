apiVersion: v1
kind: ConfigMap
metadata:
  name: deepep-test-scripts
  namespace: llm-d
data:
  get-deepep.sh: |
    #!/bin/bash
    cd /root
    if [ -d "/root/DeepEP" ]; then
      echo "Repo exists, skipping download."
      exit 0
    fi
    echo "Cloning DeepEP repository..."
    git clone "https://github.com/smarterclayton/DeepEP" /root/DeepEP
    cd /root/DeepEP && git checkout "nic_pe_alignment"
    echo "DeepEP nic_pe_alignment branch downloaded successfully"

  run-test-multinode.sh: |
    #!/bin/bash
    set -x

    # NVSHMEM configuration
    export NVSHMEM_DEBUG="INFO"
    export NVSHMEM_REMOTE_TRANSPORT="ibgda"
    export NVSHMEM_IB_ENABLE_IBGDA="true"
    export NVSHMEM_BOOTSTRAP_UID_SOCK_IFNAME="eth0"
    export NCCL_SOCKET_IFNAME="eth0"
    export GLOO_SOCKET_IFNAME="eth0"

    # Derive RANK from pod name (deepep-test-0 -> 0, deepep-test-1 -> 1, etc.)
    export RANK=${HOSTNAME##*-}

    # WORLD_SIZE is set by deployment job as environment variable
    # Falls back to 1 if not set (single-node mode)
    export WORLD_SIZE="${WORLD_SIZE:-1}"

    # Distributed training configuration
    export MASTER_ADDR="deepep-test-0.deepep-test.llm-d.svc.cluster.local"
    export MASTER_PORT=29500

    echo "=== Multi-Node DeepEP Test Configuration ==="
    echo "WORLD_SIZE: $WORLD_SIZE"
    echo "RANK: $RANK"
    echo "MASTER_ADDR: $MASTER_ADDR"
    echo "MASTER_PORT: $MASTER_PORT"
    echo "HOSTNAME: $HOSTNAME"
    echo ""

    # Show available RDMA devices
    echo "=== RDMA Devices ==="
    ls -la /dev/infiniband/ || echo "No /dev/infiniband found"
    echo ""

    # Source RDMA discovery if available
    if [ -f /data/vllm_env.sh ]; then
      echo "=== Loading RDMA Configuration ==="
      source /data/vllm_env.sh
      env | grep -E "NCCL_|NVSHMEM_|UCX_" | sort
      echo ""
    fi

    cd /root/DeepEP

    echo "=== Starting DeepEP Low-Latency Test ==="
    python tests/test_low_latency.py \
      --num-processes 8 \
      --num-tokens 128 \
      --hidden 7168 \
      --num-topk 8 \
      --num-experts 288

    echo "=== Test Complete for RANK $RANK ==="
    echo "Pod will remain running. Check logs with: oc logs deepep-test-$RANK -c test"
    sleep infinity
