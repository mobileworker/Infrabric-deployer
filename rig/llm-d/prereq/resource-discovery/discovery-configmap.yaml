apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-rdma-discovery-script
  namespace: llm-d
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    description: "Shared script for discovering GPU and RDMA resources across all overlays"
data:
  discover-gpu-rdma.sh: |
    #!/bin/bash
    # Shared GPU and RDMA resource discovery script
    # Used by all llm-d overlays to dynamically discover:
    # - GPU count per node
    # - Available RDMA resources (NVIDIA shared, SR-IOV, rdma/)
    # - Generate Helm values with proper resource requests

    set -e

    # Output file for discovered resources
    OUTPUT_FILE="${OUTPUT_FILE:-/data/discovered-resources.yaml}"
    NODE_SELECTOR="${NODE_SELECTOR:-}"  # Optional: specific node to query

    echo "🔍 Discovering GPU and RDMA resources..."

    # Get nodes with GPUs
    if [ -n "$NODE_SELECTOR" ]; then
      NODES=$(kubectl get nodes -l "$NODE_SELECTOR" -o json)
    else
      NODES=$(kubectl get nodes -o json)
    fi

    # Find nodes with GPUs
    GPU_NODES=$(echo "$NODES" | jq -r '.items[] | select(.status.allocatable["nvidia.com/gpu"]? != null and (.status.allocatable["nvidia.com/gpu"] | tonumber) > 0) | .metadata.name')

    if [ -z "$GPU_NODES" ]; then
      echo "❌ No GPU nodes found!"
      exit 1
    fi

    GPU_NODE_COUNT=$(echo "$GPU_NODES" | wc -l | tr -d ' ')
    echo "📊 Found $GPU_NODE_COUNT GPU node(s)"

    # Pick first GPU node to analyze resources
    SAMPLE_NODE=$(echo "$GPU_NODES" | head -1)
    echo "📝 Analyzing resources on node: $SAMPLE_NODE"

    # Get allocatable resources for the sample node
    ALLOCATABLE=$(kubectl get node "$SAMPLE_NODE" -o json | jq '.status.allocatable')

    # Discover GPU count
    GPU_COUNT=$(echo "$ALLOCATABLE" | jq -r '."nvidia.com/gpu" // "0"' | sed 's/[^0-9]//g')
    echo "   🎮 GPUs per node: $GPU_COUNT"

    # Discover CPU and Memory (for single-node resource calculation)
    # CPU is in millicores (e.g., "223500m"), convert to cores
    CPU_ALLOCATABLE=$(echo "$ALLOCATABLE" | jq -r '.cpu // "0"')
    CPU_CORES=$(echo "$CPU_ALLOCATABLE" | sed 's/m$//' | awk '{print int($1/1000)}')
    echo "   💻 CPU cores: $CPU_CORES"

    # Memory is in Ki (e.g., "2112316444Ki"), convert to Gi
    MEMORY_ALLOCATABLE=$(echo "$ALLOCATABLE" | jq -r '.memory // "0"')
    MEMORY_GI=$(echo "$MEMORY_ALLOCATABLE" | sed 's/Ki$//' | awk '{print int($1/1024/1024)}')
    echo "   🧠 Memory: ${MEMORY_GI}Gi"

    # Discover RDMA resources (all types with non-zero allocatable)
    # Primary: rdma/* resources (kernel RDMA shared devices)
    # Can be expanded to include openshift.io/*rdma, nvidia.com/*rdma etc if needed
    RDMA_RESOURCES=$(kubectl get node "$SAMPLE_NODE" -o json | jq -r '
      .status.allocatable |
      to_entries |
      map(select(
        (.key | startswith("rdma/")) and
        ((.value | tostring | gsub("k$";"") | tonumber) > 0)
      )) |
      map("\(.key):\(.value)") |
      .[]
    ')

    if [ -z "$RDMA_RESOURCES" ]; then
      echo "   ⚠️  No RDMA resources found"
      RDMA_COUNT=0
    else
      RDMA_COUNT=$(echo "$RDMA_RESOURCES" | wc -l | tr -d ' ')
      echo "   🌐 RDMA/IB resources found: $RDMA_COUNT"
      echo "$RDMA_RESOURCES" | while IFS=: read -r resource count; do
        echo "      - $resource: $count"
      done
    fi

    # Generate resource limits/requests YAML fragment
    echo ""
    echo "📦 Generating resource configuration..."

    cat > "$OUTPUT_FILE" << EOFYAML
    # Auto-generated by discover-gpu-rdma.sh
    # Node: $SAMPLE_NODE
    # Discovery time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

    discovered:
      gpuCount: $GPU_COUNT
      rdmaCount: $RDMA_COUNT
      tensorParallelSize: $GPU_COUNT
      nodeCount: $GPU_NODE_COUNT
      sampleNode: $SAMPLE_NODE

    # Resource limits and requests for Kubernetes pods
    resources:
      limits:
        cpu: "32"
        memory: "256Gi"
        nvidia.com/gpu: "$GPU_COUNT"
    EOFYAML

    # Add RDMA resources to limits
    if [ -n "$RDMA_RESOURCES" ]; then
      echo "$RDMA_RESOURCES" | while IFS=: read -r resource count; do
        echo "    $resource: \"1\"" >> "$OUTPUT_FILE"
      done
    fi

    cat >> "$OUTPUT_FILE" << EOFYAML
      requests:
        cpu: "32"
        memory: "256Gi"
        nvidia.com/gpu: "$GPU_COUNT"
    EOFYAML

    # Add RDMA resources to requests
    if [ -n "$RDMA_RESOURCES" ]; then
      echo "$RDMA_RESOURCES" | while IFS=: read -r resource count; do
        echo "    $resource: \"1\"" >> "$OUTPUT_FILE"
      done
    fi

    # Calculate single-node P/D split (even power-of-2 split)
    # For single-node deployments, divide GPUs between prefill and decode
    # Must be power of 2 for tensor parallelism (1, 2, 4, 8, 16, etc)
    # Examples: 8 GPUs -> 4/4, 6 GPUs -> 2/2, 4 GPUs -> 2/2, 2 GPUs -> 1/1

    calculate_pd_split() {
      local total=$1
      local half=$((total / 2))

      # Find largest power of 2 that is <= half
      local split=1
      while [ $((split * 2)) -le $half ]; do
        split=$((split * 2))
      done

      echo $split
    }

    PD_SPLIT=$(calculate_pd_split $GPU_COUNT)
    TOTAL_USED_GPUS=$((PD_SPLIT * 2))

    # Calculate CPU/Memory split for single-node (use 80% of allocatable, split evenly)
    # Leave 20% for system overhead and other pods
    USABLE_CPU_CORES=$((CPU_CORES * 50 / 100))
    USABLE_MEMORY_GI=$((MEMORY_GI * 80 / 100))

    # Split evenly between prefill and decode
    CPU_PER_POD=$((USABLE_CPU_CORES / 2))
    MEMORY_PER_POD=$((USABLE_MEMORY_GI / 2))

    # Ensure minimum resources
    if [ $CPU_PER_POD -lt 8 ]; then
      CPU_PER_POD=8
    fi
    if [ $MEMORY_PER_POD -lt 32 ]; then
      MEMORY_PER_POD=32
    fi

    echo "   💻 Usable CPU: $USABLE_CPU_CORES cores (50% of $CPU_CORES)"
    echo "   🧠 Usable Memory: ${USABLE_MEMORY_GI}Gi (80% of ${MEMORY_GI}Gi)"
    echo "   ⚖️  Per pod: ${CPU_PER_POD} cores, ${MEMORY_PER_POD}Gi memory"

    # Generate vLLM configuration
    cat >> "$OUTPUT_FILE" << EOFYAML

    # vLLM configuration
    vllm:
      # Multi-node: Use all GPUs for tensor parallelism
      multinode:
        tensorParallelSize: $GPU_COUNT

      # Single-node P/D: Split GPUs evenly between prefill and decode
      singlenode:
        prefillTensorParallelSize: $PD_SPLIT
        decodeTensorParallelSize: $PD_SPLIT
        totalUsedGpus: $TOTAL_USED_GPUS
        unusedGpus: $((GPU_COUNT - TOTAL_USED_GPUS))
        # Power of 2 constraint for tensor parallelism
        # Examples: 8->4/4, 7->2/2, 6->2/2, 4->2/2, 2->1/1

    # Resource allocation per pod (single-node)
    singleNodeResources:
      cpuPerPod: $CPU_PER_POD
      memoryPerPodGi: $MEMORY_PER_POD
      totalCpuCores: $CPU_CORES
      totalMemoryGi: $MEMORY_GI
      usableCpuCores: $USABLE_CPU_CORES
      usableMemoryGi: $USABLE_MEMORY_GI

    # RDMA device list (for NCCL_IB_HCA)
    rdmaDevices:
    EOFYAML

    if [ -n "$RDMA_RESOURCES" ]; then
      # Extract device names for NCCL configuration
      # For rdma/rdma_shared_nicX, extract the NIC name
      echo "$RDMA_RESOURCES" | grep "^rdma/" | while IFS=: read -r resource count; do
        DEVICE_NAME=$(echo "$resource" | sed 's|^rdma/rdma_shared_||')
        echo "  - $DEVICE_NAME" >> "$OUTPUT_FILE"
      done
    fi

    echo ""
    echo "✅ Discovery complete!"
    echo "   Output: $OUTPUT_FILE"
    echo ""
    echo "Summary:"
    echo "  - GPUs: $GPU_COUNT per node"
    echo "  - RDMA resources: $RDMA_COUNT"
    echo "  - Tensor parallel size: $GPU_COUNT"
    echo "  - GPU nodes: $GPU_NODE_COUNT"
