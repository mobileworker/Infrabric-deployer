apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: inference-extproc-filter
  namespace: llm-d
  labels:
    app: llm-d
    component: inferencepool-controller
  annotations:
    argocd.argoproj.io/sync-wave: "14"
    description: "Configures Istio gateway to use GAIE EPP for inference routing"
spec:
  # Apply to any gateway with the inference ext-proc label
  workloadSelector:
    labels:
      istio.io/enable-inference-extproc: "true"
  configPatches:
  # Insert the ext_proc filter before the router filter
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
            subFilter:
              name: "envoy.filters.http.router"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.ext_proc
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
          grpc_service:
            envoy_grpc:
              cluster_name: "outbound|9002||gaie-pd-epp.llm-d.svc.cluster.local"
            timeout: 30s
          message_timeout: 30s
          failure_mode_allow: false
          processing_mode:
            request_header_mode: SEND
            response_header_mode: SKIP
            request_body_mode: NONE
            response_body_mode: NONE
