apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-d-client
  namespace: llm-d
  labels:
    app: llm-d-client
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llm-d-client
  labels:
    app: llm-d-client
rules:
  # Broad permissions for all common API groups needed for Helm chart deployments
  # This service account is designed to deploy complex infrastructure via Helm
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llm-d-client
  labels:
    app: llm-d-client
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llm-d-client
subjects:
  - kind: ServiceAccount
    name: llm-d-client
    namespace: llm-d
