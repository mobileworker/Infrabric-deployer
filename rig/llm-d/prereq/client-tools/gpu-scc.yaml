apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: llm-d-gpu-scc
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    kubernetes.io/description: "SCC for LLM-d GPU workloads requiring privileged access for RDMA and GPU resources"
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: false
allowHostPID: true
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: true
allowedCapabilities:
  - '*'
allowedUnsafeSysctls:
  - '*'
defaultAddCapabilities: null
fsGroup:
  type: RunAsAny
groups: []
priority: 10
readOnlyRootFilesystem: false
requiredDropCapabilities: null
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
users:
  - system:serviceaccount:llm-d:llm-d-modelserver
  - system:serviceaccount:llm-d:ms-pd-llm-d-modelservice
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - hostPath
