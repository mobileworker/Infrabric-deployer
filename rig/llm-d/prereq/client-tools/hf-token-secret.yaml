apiVersion: v1
kind: Secret
metadata:
  name: llm-d-hf-token
  namespace: llm-d
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    description: |
      HuggingFace token for downloading models.

      Default: Empty string (works for public models like Meta-Llama-3.1-8B-FP8)

      For gated/private models (like Qwen3-32B, DeepSeek-R1, etc.):
      1. Get your token from https://huggingface.co/settings/tokens
      2. Update this secret:
         oc create secret generic llm-d-hf-token \
           --from-literal="HF_TOKEN=hf_your_token_here" \
           --namespace llm-d --dry-run=client -o yaml | oc apply -f -
      3. Restart pods to pick up the new token:
         oc rollout restart deployment -n llm-d

      The secret is created with an empty token by default, so deployments
      won't fail - but gated models will fail to download without a valid token.
type: Opaque
stringData:
  HF_TOKEN: ""  # Empty by default - update with your token for gated models
