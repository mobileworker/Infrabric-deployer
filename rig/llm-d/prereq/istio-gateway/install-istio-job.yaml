apiVersion: batch/v1
kind: Job
metadata:
  name: install-istio-gateway
  namespace: llm-d
  labels:
    app: istio-installer
    component: gateway-provider
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: istio-installer
    spec:
      serviceAccountName: llm-d-client
      restartPolicy: OnFailure
      containers:
        - name: install-istio
          image: registry.access.redhat.com/ubi9/ubi:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              echo "========================================="
              echo "Istio Gateway Installation"
              echo "========================================="

              # Install kubectl
              echo "📦 Installing kubectl..."
              mkdir -p /tmp/bin
              export PATH="/tmp/bin:$PATH"

              KUBE_VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
              curl -sSL "https://dl.k8s.io/release/${KUBE_VERSION}/bin/linux/amd64/kubectl" -o /tmp/bin/kubectl
              chmod +x /tmp/bin/kubectl

              echo "✅ kubectl installed"

              # Step 1: Install Inference Extension CRDs
              echo ""
              echo "========================================="
              echo "Step 1: Installing Inference Extension CRDs"
              echo "========================================="

              GATEWAY_INFERENCE_VERSION="v1.3.1"
              echo "Installing Gateway API Inference Extension CRDs ${GATEWAY_INFERENCE_VERSION}..."
              kubectl apply -f "https://github.com/kubernetes-sigs/gateway-api-inference-extension/releases/download/${GATEWAY_INFERENCE_VERSION}/manifests.yaml"

              echo "✅ Inference CRDs installed"

              # Step 2: Install Istio using official getmesh approach
              echo ""
              echo "========================================="
              echo "Step 2: Installing Istio"
              echo "========================================="

              # Create namespace
              kubectl create namespace istio-system --dry-run=client -o yaml | kubectl apply -f -

              # Download and install istioctl
              echo "📦 Finding latest Istio version..."
              ISTIO_VERSION=$(curl -sL https://api.github.com/repos/istio/istio/releases | grep '"tag_name"' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
              if [ -z "$ISTIO_VERSION" ]; then
                echo "⚠️  Could not detect version, using 1.29.1"
                ISTIO_VERSION="1.29.1"
              fi
              echo "📦 Downloading Istio $ISTIO_VERSION..."
              cd /tmp
              curl -sL https://istio.io/downloadIstio | ISTIO_VERSION=${ISTIO_VERSION} bash
              mv istio-${ISTIO_VERSION}/bin/istioctl /tmp/bin/
              echo "✅ istioctl installed"

              # Install Istio with minimal profile + Gateway API + Inference Extension
              echo "Installing Istio minimal profile..."
              istioctl install --set profile=minimal \
                --set values.pilot.env.PILOT_ENABLE_GATEWAY_API=true \
                --set values.pilot.env.PILOT_ENABLE_GATEWAY_API_STATUS=true \
                --set values.pilot.env.PILOT_ENABLE_GATEWAY_API_DEPLOYMENT_CONTROLLER=true \
                --set values.pilot.env.ENABLE_GATEWAY_API_INFERENCE_EXTENSION=true \
                --set meshConfig.defaultConfig.proxyMetadata.ENABLE_GATEWAY_API_INFERENCE_EXTENSION=true \
                -y

              # Wait for istiod
              echo "⏳ Waiting for istiod..."
              kubectl wait --for=condition=available --timeout=600s deployment/istiod -n istio-system

              echo "✅ Istio installed"

              # Step 3: Verification
              echo ""
              echo "========================================="
              echo "Verification"
              echo "========================================="

              kubectl get pods -n istio-system
              kubectl get gatewayclass

              echo ""
              echo "✅ Istio installation complete!"

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
